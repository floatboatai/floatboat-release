      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nightly-macos-x64
          path: |
            out/make/**/*.dmg
            out/make/**/*.zip
          retention-days: 7

  build-windows:
    name: Build Windows (x64)
    needs: prepare
    runs-on: windows-latest
    if: needs.prepare.outputs.package_set != 'launcher' && contains(needs.prepare.outputs.platforms, 'windows')

    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.SOURCE_REPO }}
          ref: ${{ needs.prepare.outputs.ref }}
          token: ${{ secrets.SOURCE_REPO_PAT }}
          submodules: recursive

      - name: Inject test build .env
        if: needs.prepare.outputs.build_profile == 'test'
        shell: bash
        env:
          TEST_BUILD_ENV_FILE: ${{ secrets.TEST_BUILD_ENV_FILE }}
        run: |
          set -euo pipefail
          if [ -z "${TEST_BUILD_ENV_FILE:-}" ]; then
