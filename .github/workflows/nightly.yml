            [ -n "$line" ] && echo "::add-mask::$line"
          done <<< "$TEST_BUILD_ENV_FILE"
          printf '%s\n' "$TEST_BUILD_ENV_FILE" > .env
          entry_count=$(grep -Ec '^[[:space:]]*[A-Za-z_][A-Za-z0-9_]*=' .env || true)
          echo "✅ Injected test build .env (${entry_count} entries)."

      - name: Inject version
        shell: bash
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '${{ needs.prepare.outputs.version }}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Gemini CLI
        run: pnpm run build:gemini

      - name: Build and package (production)
        run: pnpm run forge:make
        env:
          BUILD_OBFUSCATE: "true"

      - name: Collect production Windows artifact
        shell: bash
        run: |
          mkdir -p dist/windows
          find out/make -name "*.exe" | while read f; do
            dir=$(dirname "$f")
            base=$(basename "$f")
            newname=$(echo "$base" | tr ' ' '-')
            if [ "$base" != "$newname" ]; then
              mv "$f" "$dir/$newname"
              echo "Renamed: $base -> $newname"
            fi
          done
          PROD_EXE=$(find out/make -type f -name "*.exe" | head -1)
          [ -n "$PROD_EXE" ] || { echo "Production EXE not found"; exit 1; }
          cp "$PROD_EXE" "dist/windows/"
          echo "✅ Production Windows artifact: $(basename "$PROD_EXE")"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nightly-windows-x64
          path: |
            dist/windows/*.exe
          retention-days: 7
          if-no-files-found: error

  build-test-launcher-macos-arm64:
    name: Build Test Launcher macOS (arm64)
    needs: prepare
    runs-on: macos-latest
    if: needs.prepare.outputs.package_set != 'app' && contains(needs.prepare.outputs.platforms, 'macos')

    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.SOURCE_REPO }}
          ref: ${{ needs.prepare.outputs.ref }}
          token: ${{ secrets.SOURCE_REPO_PAT }}
          submodules: recursive

      - name: Inject test build .env
        if: needs.prepare.outputs.build_profile == 'test'
        shell: bash
        env:
          TEST_BUILD_ENV_FILE: ${{ secrets.TEST_BUILD_ENV_FILE }}
        run: |
          set -euo pipefail
          if [ -z "${TEST_BUILD_ENV_FILE:-}" ]; then
            echo "::error::TEST_BUILD_ENV_FILE secret is required when build_profile=test"
            exit 1
          fi
