name: Nightly Build

# 每天北京时间 00:00 (UTC 16:00) 自动构建 dev 分支
on:
  schedule:
    - cron: '0 16 * * *'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch or ref to build (default: dev)'
        required: false
        default: 'dev'
        type: string
      platforms:
        description: 'Platforms to build'
        required: false
        default: 'macos,windows'
        type: choice
        options:
          - 'macos,windows'
          - 'macos'
          - 'windows'

permissions:
  contents: write
  actions: read

jobs:
  prepare:
    name: Prepare Nightly
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.nightly_version }}
      ref: ${{ steps.ref.outputs.ref }}
      platforms: ${{ steps.config.outputs.platforms }}

    steps:
      - name: Determine ref
        id: ref
        run: |
          if [ "${{ github.event_name }}" == "schedule" ]; then
            echo "ref=dev" >> $GITHUB_OUTPUT
          else
            echo "ref=${{ github.event.inputs.ref || 'dev' }}" >> $GITHUB_OUTPUT
          fi

      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.SOURCE_REPO }}
          ref: ${{ steps.ref.outputs.ref }}
          token: ${{ secrets.SOURCE_REPO_PAT }}

      - name: Determine nightly version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          DATE=$(date -u +%Y%m%d)
          NIGHTLY="${VERSION}-nightly.${DATE}"
          echo "nightly_version=$NIGHTLY" >> $GITHUB_OUTPUT
          echo "📦 Nightly version: $NIGHTLY"

      - name: Read config
        id: config
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "platforms=${{ github.event.inputs.platforms || 'macos,windows' }}" >> $GITHUB_OUTPUT
          else
            echo "platforms=macos,windows" >> $GITHUB_OUTPUT
          fi

  build-macos-arm64:
    name: Build macOS (arm64)
    needs: prepare
    runs-on: macos-latest
    if: contains(needs.prepare.outputs.platforms, 'macos')

    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.SOURCE_REPO }}
          ref: ${{ needs.prepare.outputs.ref }}
          token: ${{ secrets.SOURCE_REPO_PAT }}
          submodules: recursive

      - name: Inject version
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '${{ needs.prepare.outputs.version }}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Gemini CLI
        run: pnpm run build:gemini

      - name: Check code signing
        id: signing
        run: |
          if [ -n "$APPLE_CERTIFICATE" ]; then
            echo "available=true" >> $GITHUB_OUTPUT
          else
            echo "available=false" >> $GITHUB_OUTPUT
          fi
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}

      - name: Import Certificate
        if: steps.signing.outputs.available == 'true'
        uses: apple-actions/import-codesign-certs@v2
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Build arm64
        run: pnpm run forge:make:arm64
        env:
          NODE_OPTIONS: --max-old-space-size=8192
          BUILD_OBFUSCATE: "true"
          APPLE_IDENTITY: ${{ steps.signing.outputs.available == 'true' && secrets.APPLE_IDENTITY || '' }}
          APPLE_ID: ${{ steps.signing.outputs.available == 'true' && secrets.APPLE_ID || '' }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ steps.signing.outputs.available == 'true' && secrets.APPLE_APP_SPECIFIC_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ steps.signing.outputs.available == 'true' && secrets.APPLE_TEAM_ID || '' }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nightly-macos-arm64
          path: |
            out/make/**/*.dmg
            out/make/**/*.zip
          retention-days: 7

  build-macos-x64:
    name: Build macOS (x64)
    needs: prepare
    runs-on: macos-latest
    if: contains(needs.prepare.outputs.platforms, 'macos')

    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.SOURCE_REPO }}
          ref: ${{ needs.prepare.outputs.ref }}
          token: ${{ secrets.SOURCE_REPO_PAT }}
          submodules: recursive

      - name: Inject version
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '${{ needs.prepare.outputs.version }}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Gemini CLI
        run: pnpm run build:gemini

      - name: Check code signing
        id: signing
        run: |
          if [ -n "$APPLE_CERTIFICATE" ]; then
            echo "available=true" >> $GITHUB_OUTPUT
          else
            echo "available=false" >> $GITHUB_OUTPUT
          fi
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}

      - name: Import Certificate
        if: steps.signing.outputs.available == 'true'
        uses: apple-actions/import-codesign-certs@v2
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Build x64
        run: pnpm run forge:make:x64
        env:
          NODE_OPTIONS: --max-old-space-size=8192
          BUILD_OBFUSCATE: "true"
          APPLE_IDENTITY: ${{ steps.signing.outputs.available == 'true' && secrets.APPLE_IDENTITY || '' }}
          APPLE_ID: ${{ steps.signing.outputs.available == 'true' && secrets.APPLE_ID || '' }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ steps.signing.outputs.available == 'true' && secrets.APPLE_APP_SPECIFIC_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ steps.signing.outputs.available == 'true' && secrets.APPLE_TEAM_ID || '' }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nightly-macos-x64
          path: |
            out/make/**/*.dmg
            out/make/**/*.zip
          retention-days: 7

  build-windows:
    name: Build Windows (x64)
    needs: prepare
    runs-on: windows-latest
    if: contains(needs.prepare.outputs.platforms, 'windows')

    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.SOURCE_REPO }}
          ref: ${{ needs.prepare.outputs.ref }}
          token: ${{ secrets.SOURCE_REPO_PAT }}
          submodules: recursive

      - name: Inject version
        shell: bash
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '${{ needs.prepare.outputs.version }}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Gemini CLI
        run: pnpm run build:gemini

      - name: Build and package
        run: pnpm run forge:make
        env:
          NODE_OPTIONS: --max-old-space-size=8192
          BUILD_OBFUSCATE: "true"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nightly-windows-x64
          path: |
            out/make/**/*.exe
          retention-days: 7
          if-no-files-found: error

  upload:
    name: Publish Nightly
    needs: [prepare, build-macos-arm64, build-macos-x64, build-windows]
    runs-on: ubuntu-latest
    if: |
      always() &&
      (needs.build-macos-arm64.result == 'success' || needs.build-macos-x64.result == 'success' || needs.build-windows.result == 'success')

    steps:
      - name: Checkout source repo (for scripts)
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.SOURCE_REPO }}
          ref: ${{ needs.prepare.outputs.ref }}
          token: ${{ secrets.SOURCE_REPO_PAT }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Collect artifacts
        run: |
          mkdir -p out/make dist
          find artifacts/ -type f \( -name "*.dmg" -o -name "*.zip" -o -name "*.exe" \) -exec cp {} out/make/ \;
          echo "📦 Nightly artifacts:"
          ls -la out/make/

      - name: Generate macOS Update Metadata
        if: needs.build-macos-arm64.result == 'success' || needs.build-macos-x64.result == 'success'
        run: |
          chmod +x scripts/generate-latest-yml.sh
          ./scripts/generate-latest-yml.sh --platform mac

      - name: Generate Windows Update Metadata
        if: needs.build-windows.result == 'success'
        run: |
          chmod +x scripts/generate-latest-yml.sh
          EXE_FILE=$(find out/make -name "*.exe" | head -1)
          [ -n "$EXE_FILE" ] && ./scripts/generate-latest-yml.sh --platform win "$EXE_FILE"

      - name: Create Nightly Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly-${{ needs.prepare.outputs.version }}
          name: "Nightly ${{ needs.prepare.outputs.version }}"
          body: |
            Automated nightly build from `dev` branch.
            Version: ${{ needs.prepare.outputs.version }}
          draft: false
          prerelease: true
          files: |
            out/make/*.dmg
            out/make/*.zip
            out/make/*.exe
            dist/latest-mac.yml
            dist/latest.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
