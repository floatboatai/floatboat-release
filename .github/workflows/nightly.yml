name: Nightly Build

# 每天北京时间 00:00 (UTC 16:00) 自动构建 dev 分支
on:
  schedule:
    - cron: '0 16 * * *'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch or ref to build (default: dev)'
        required: false
        default: 'dev'
        type: string
      platforms:
        description: 'Platforms to build'
        required: false
        default: 'macos,windows'
        type: choice
        options:
          - 'macos,windows'
          - 'macos'
          - 'windows'
      build_profile:
        description: 'Build profile (test injects TEST_BUILD_ENV_FILE into .env)'
        required: false
        default: 'release'
        type: choice
        options:
          - 'release'
          - 'test'
      package_set:
        description: 'Package set to build (auto: test=app, release=all)'
        required: false
        default: 'auto'
        type: choice
        options:
          - 'auto'
          - 'app'
          - 'launcher'
          - 'all'
      promote_merged_bugs:
        description: 'Promote merged dev bug PRs to acceptance after app packaging succeeds'
        required: false
        default: true
        type: boolean

permissions:
  contents: write
  actions: read

jobs:
  prepare:
    name: Prepare Nightly
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.nightly_version }}
      ref: ${{ steps.ref.outputs.ref }}
      platforms: ${{ steps.config.outputs.platforms }}
      build_profile: ${{ steps.version.outputs.build_profile }}
      package_set: ${{ steps.version.outputs.package_set }}
      promote_merged_bugs: ${{ steps.version.outputs.promote_merged_bugs }}
      prev_tag: ${{ steps.changelog.outputs.prev_tag }}
      changelog_file: ${{ steps.changelog.outputs.changelog_file }}

    steps:
      - name: Determine ref
        id: ref
        run: |
          if [ "${{ github.event_name }}" == "schedule" ]; then
            echo "ref=dev" >> $GITHUB_OUTPUT
          else
            echo "ref=${{ github.event.inputs.ref || 'dev' }}" >> $GITHUB_OUTPUT
          fi

      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.SOURCE_REPO }}
          ref: ${{ steps.ref.outputs.ref }}
          token: ${{ secrets.SOURCE_REPO_PAT }}
          fetch-depth: 0

      - name: Determine nightly version
        id: version
        run: |
          set -euo pipefail
          DATE=$(date -u +%Y%m%d)
          BUILD_PROFILE="release"
          PACKAGE_SET="auto"
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            BUILD_PROFILE="${{ github.event.inputs.build_profile || 'release' }}"
            PACKAGE_SET="${{ github.event.inputs.package_set || 'auto' }}"
            PROMOTE_MERGED_BUGS="${{ github.event.inputs.promote_merged_bugs || 'true' }}"
          else
            PROMOTE_MERGED_BUGS="true"
          fi
          if [ "$PACKAGE_SET" = "auto" ]; then
            if [ "$BUILD_PROFILE" = "test" ]; then
              PACKAGE_SET="app"
            else
              PACKAGE_SET="all"
            fi
          fi

          LATEST_RELEASE_TAG=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1 || true)
          if [ -z "$LATEST_RELEASE_TAG" ]; then
            echo "::warning::No official release tag found in source repo; falling back to package.json + 1"
            RELEASE_VERSION=$(node -p "require('./package.json').version")
          else
            RELEASE_VERSION="${LATEST_RELEASE_TAG#v}"
            echo "🔖 Latest official release tag: ${LATEST_RELEASE_TAG}"
          fi

          VERSION=$(node -e "
            const m = process.argv[1].match(/^(\d+)\.(\d+)\.(\d+)/);
            if (!m) throw new Error('Unsupported version format: ' + process.argv[1]);
            process.stdout.write(\`\${m[1]}.\${m[2]}.\${Number(m[3]) + 1}\`);
          " "$RELEASE_VERSION")

          if [ "$BUILD_PROFILE" = "test" ]; then
            NIGHTLY="${VERSION}-test.${DATE}"
          else
            NIGHTLY="${VERSION}-n.${DATE}"
          fi
          echo "nightly_version=$NIGHTLY" >> $GITHUB_OUTPUT
          echo "build_profile=$BUILD_PROFILE" >> $GITHUB_OUTPUT
          echo "package_set=$PACKAGE_SET" >> $GITHUB_OUTPUT
          echo "promote_merged_bugs=$PROMOTE_MERGED_BUGS" >> $GITHUB_OUTPUT
          echo "📦 Nightly version: $NIGHTLY (from release v${RELEASE_VERSION} + 1, $BUILD_PROFILE, $PACKAGE_SET, promote=$PROMOTE_MERGED_BUGS)"

      - name: Read config
        id: config
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "platforms=${{ github.event.inputs.platforms || 'macos,windows' }}" >> $GITHUB_OUTPUT
          else
            echo "platforms=macos,windows" >> $GITHUB_OUTPUT
          fi

      - name: Generate internal nightly release note
        id: changelog
        run: |
          set -e
          VERSION="${{ steps.version.outputs.nightly_version }}"
          CURRENT_TAG="nightly-${VERSION}"

          # Nightly builds are built from the source repository. Compare source HEAD
          # with the previous reachable source tag, not release-repo nightly tags.
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || true)
          CHANGELOG_FILE="nightly-changelog-${PREV_TAG:-initial}-${CURRENT_TAG}.md"
          CHANGELOG_FILE=$(echo "$CHANGELOG_FILE" | tr '/ ' '--')

          echo "prev_tag=${PREV_TAG}" >> $GITHUB_OUTPUT
          echo "changelog_file=${CHANGELOG_FILE}" >> $GITHUB_OUTPUT

          {
            echo "# Nightly ${CURRENT_TAG}"
            echo ""
            if [ -n "$PREV_TAG" ]; then
              echo "**Changes since ${PREV_TAG}:**"
              echo ""
              CHANGES=$(git log "${PREV_TAG}..HEAD" --no-merges --format="- %s" | head -200)
              if [ -n "$CHANGES" ]; then
                echo "$CHANGES"
              else
                echo "_无更新。_"
              fi
            else
              echo "_This is the initial nightly build — no previous source tag found._"
            fi
            echo ""
            echo "---"
            echo "*Generated $(date -u '+%Y-%m-%d %H:%M UTC') · Internal nightly release note for Feishu notification only.*"
          } > "/tmp/${CHANGELOG_FILE}"

          echo "✅ Nightly changelog: ${CHANGELOG_FILE}"
          echo "🔖 Previous source tag: ${PREV_TAG:-none}"
          head -30 "/tmp/${CHANGELOG_FILE}"

      - name: Prepare empty public release body
        run: |
          # Nightly release notes must stay internal-only; keep the public GitHub Release body empty.
          : > /tmp/release_notes.md

      - name: Upload empty public release body
        uses: actions/upload-artifact@v4
        with:
          name: nightly-release-notes
          path: /tmp/release_notes.md
          retention-days: 1

      - name: Upload internal nightly release note
        uses: actions/upload-artifact@v4
        with:
          name: nightly-internal-release-note
          path: /tmp/nightly-changelog-*.md
          retention-days: 7

  build-macos-arm64:
    name: Build macOS (arm64)
    needs: prepare
    runs-on: macos-latest
    if: needs.prepare.outputs.package_set != 'launcher' && contains(needs.prepare.outputs.platforms, 'macos')

    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.SOURCE_REPO }}
          ref: ${{ needs.prepare.outputs.ref }}
          token: ${{ secrets.SOURCE_REPO_PAT }}
          submodules: recursive

      - name: Inject test build .env
        if: needs.prepare.outputs.build_profile == 'test'
        shell: bash
        env:
          TEST_BUILD_ENV_FILE: ${{ secrets.TEST_BUILD_ENV_FILE }}
        run: |
          set -euo pipefail
          if [ -z "${TEST_BUILD_ENV_FILE:-}" ]; then
            echo "::error::TEST_BUILD_ENV_FILE secret is required when build_profile=test"
            exit 1
          fi
          while IFS= read -r line; do
            [ -n "$line" ] && echo "::add-mask::$line"
          done <<< "$TEST_BUILD_ENV_FILE"
          printf '%s\n' "$TEST_BUILD_ENV_FILE" > .env
          entry_count=$(grep -Ec '^[[:space:]]*[A-Za-z_][A-Za-z0-9_]*=' .env || true)
          echo "✅ Injected test build .env (${entry_count} entries)."

      - name: Inject version
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '${{ needs.prepare.outputs.version }}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Gemini CLI
        run: pnpm run build:gemini

      - name: Check code signing
        id: signing
        run: |
          if [ -n "$APPLE_CERTIFICATE" ]; then
            echo "available=true" >> $GITHUB_OUTPUT
          else
            echo "available=false" >> $GITHUB_OUTPUT
          fi
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}

      - name: Import Certificate
        if: steps.signing.outputs.available == 'true'
        uses: apple-actions/import-codesign-certs@v2
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Build arm64
        run: pnpm run forge:make:arm64
        env:
          NODE_OPTIONS: --max-old-space-size=8192
          BUILD_OBFUSCATE: "true"
          APPLE_IDENTITY: ${{ steps.signing.outputs.available == 'true' && secrets.APPLE_IDENTITY || '' }}
          APPLE_ID: ${{ steps.signing.outputs.available == 'true' && secrets.APPLE_ID || '' }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ steps.signing.outputs.available == 'true' && secrets.APPLE_APP_SPECIFIC_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ steps.signing.outputs.available == 'true' && secrets.APPLE_TEAM_ID || '' }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nightly-macos-arm64
          path: |
            out/make/**/*.dmg
            out/make/**/*.zip
          retention-days: 7

  build-macos-x64:
    name: Build macOS (x64)
