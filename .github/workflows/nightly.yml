name: Nightly Build

# 每天北京时间 00:00 (UTC 16:00) 自动构建 dev 分支
on:
  schedule:
    - cron: '0 16 * * *'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch or ref to build (default: dev)'
        required: false
        default: 'dev'
        type: string
      platforms:
        description: 'Platforms to build'
        required: false
        default: 'macos,windows'
        type: choice
        options:
          - 'macos,windows'
          - 'macos'
          - 'windows'

permissions:
  contents: write
  actions: read

jobs:
  prepare:
    name: Prepare Nightly
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.nightly_version }}
      ref: ${{ steps.ref.outputs.ref }}
      platforms: ${{ steps.config.outputs.platforms }}

    steps:
      - name: Determine ref
        id: ref
        run: |
          if [ "${{ github.event_name }}" == "schedule" ]; then
            echo "ref=dev" >> $GITHUB_OUTPUT
          else
            echo "ref=${{ github.event.inputs.ref || 'dev' }}" >> $GITHUB_OUTPUT
          fi

      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.SOURCE_REPO }}
          ref: ${{ steps.ref.outputs.ref }}
          token: ${{ secrets.SOURCE_REPO_PAT }}
          fetch-depth: 0

      - name: Determine nightly version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          DATE=$(date -u +%Y%m%d)
          NIGHTLY="${VERSION}-n.${DATE}"
          echo "nightly_version=$NIGHTLY" >> $GITHUB_OUTPUT
          echo "📦 Nightly version: $NIGHTLY"

      - name: Read config
        id: config
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "platforms=${{ github.event.inputs.platforms || 'macos,windows' }}" >> $GITHUB_OUTPUT
          else
            echo "platforms=macos,windows" >> $GITHUB_OUTPUT
          fi

      - name: Collect recent changes (last 24h)
        id: changes
        run: |
          SINCE=$(date -u -d '24 hours ago' +%Y-%m-%dT%H:%M:%S 2>/dev/null || date -u -v-24H +%Y-%m-%dT%H:%M:%S)
          echo "since=$SINCE" >> $GITHUB_OUTPUT

          # Get commits from last 24h
          COMMITS=$(git log --since="$SINCE" --pretty=format:"- %s (%an)" --no-merges 2>/dev/null || echo "")
          COMMIT_COUNT=$(git log --since="$SINCE" --oneline --no-merges 2>/dev/null | wc -l | tr -d ' ')
          echo "commit_count=$COMMIT_COUNT" >> $GITHUB_OUTPUT

          # Get merged PRs from last 24h
          PR_DATA=$(gh pr list --repo "${{ vars.SOURCE_REPO }}" --state merged --search "merged:>=$SINCE" --limit 30 --json number,title,body --jq '[.[] | {number, title, body: (.body // "" | .[0:500])}]' 2>/dev/null || echo "[]")
          PR_COUNT=$(echo "$PR_DATA" | jq length)
          echo "pr_count=$PR_COUNT" >> $GITHUB_OUTPUT

          # Save for AI summary
          echo "$COMMITS" > /tmp/recent_commits.txt
          echo "$PR_DATA" > /tmp/recent_prs.json
        env:
          GH_TOKEN: ${{ secrets.SOURCE_REPO_PAT }}

      - name: Generate nightly release notes with AI
        id: changelog
        continue-on-error: true
        run: |
          VERSION="${{ steps.version.outputs.nightly_version }}"
          COMMIT_COUNT="${{ steps.changes.outputs.commit_count }}"
          PR_COUNT="${{ steps.changes.outputs.pr_count }}"
          COMMITS=$(cat /tmp/recent_commits.txt)
          PR_DATA=$(cat /tmp/recent_prs.json)

          if [ "$COMMIT_COUNT" == "0" ] && [ "$PR_COUNT" == "0" ]; then
            echo "No changes in last 24h" > /tmp/release_notes.md
            exit 0
          fi

          PROMPT="You are writing public-facing nightly build notes for Floatboat Desktop ${VERSION}.

          Below is internal development data from the last 24 hours. Transform it into user-friendly update notes. Important rules:
          - Write from the USER's perspective (what they gain), not the developer's perspective
          - Do NOT expose commit hashes, PR numbers, branch names, internal module names, file paths, or implementation details
          - Do NOT mention refactoring, code cleanup, or internal architecture changes unless they improve user experience
          - Skip CI/docs/test/chore changes entirely
          - If a change is purely internal with no user-visible impact, omit it
          - Use bilingual format (Chinese + English), Chinese first
          - Keep each item to one concise line
          - If all changes are internal, just write a brief note saying this is a routine nightly build with stability improvements

          Format:
          ## 每日构建 / Nightly Build ${VERSION}
          ### ✨ 新功能 / New Features
          - 中文描述 / English description
          ### 🐛 问题修复 / Bug Fixes
          - 中文描述 / English description
          ### 💪 体验优化 / Improvements
          - 中文描述 / English description

          Internal data (${COMMIT_COUNT} commits, ${PR_COUNT} PRs):
          Commits: ${COMMITS}
          PRs: ${PR_DATA}"

          NOTES=""
          for attempt in 1 2 3; do
            RESPONSE=$(curl -s --max-time 120 -X POST "${{ vars.AI_API_ENDPOINT }}" \
              -H "Content-Type: application/json" \
              -H "x-api-key: $AI_API_KEY" \
              -H "anthropic-version: 2023-06-01" \
              -d "$(jq -n \
                --arg model "${{ vars.AI_MODEL }}" \
                --arg prompt "$PROMPT" \
                '{model: $model, max_tokens: 1024, messages: [{role: "user", content: $prompt}]}')")
            NOTES=$(echo "$RESPONSE" | jq -r '.content[0].text // empty')
            if [ -n "$NOTES" ]; then break; fi
            [ "$attempt" -lt 3 ] && sleep 3
          done

          if [ -z "$NOTES" ]; then
            # Fallback: list commits directly
            NOTES="## Nightly ${VERSION}\n\n### Recent changes (last 24h)\n\n${COMMITS}"
          fi

          echo "$NOTES" > /tmp/release_notes.md
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}

      - name: Upload release notes
        uses: actions/upload-artifact@v4
        with:
          name: nightly-release-notes
          path: /tmp/release_notes.md
          retention-days: 1

  build-macos-arm64:
    name: Build macOS (arm64)
    needs: prepare
    runs-on: macos-latest
    if: contains(needs.prepare.outputs.platforms, 'macos')

    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.SOURCE_REPO }}
          ref: ${{ needs.prepare.outputs.ref }}
          token: ${{ secrets.SOURCE_REPO_PAT }}
          submodules: recursive

      - name: Inject version
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '${{ needs.prepare.outputs.version }}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Gemini CLI
        run: pnpm run build:gemini

      - name: Check code signing
        id: signing
        run: |
          if [ -n "$APPLE_CERTIFICATE" ]; then
            echo "available=true" >> $GITHUB_OUTPUT
          else
            echo "available=false" >> $GITHUB_OUTPUT
          fi
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}

      - name: Import Certificate
        if: steps.signing.outputs.available == 'true'
        uses: apple-actions/import-codesign-certs@v2
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Build arm64
        run: pnpm run forge:make:arm64
        env:
          NODE_OPTIONS: --max-old-space-size=8192
          BUILD_OBFUSCATE: "true"
          APPLE_IDENTITY: ${{ steps.signing.outputs.available == 'true' && secrets.APPLE_IDENTITY || '' }}
          APPLE_ID: ${{ steps.signing.outputs.available == 'true' && secrets.APPLE_ID || '' }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ steps.signing.outputs.available == 'true' && secrets.APPLE_APP_SPECIFIC_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ steps.signing.outputs.available == 'true' && secrets.APPLE_TEAM_ID || '' }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nightly-macos-arm64
          path: |
            out/make/**/*.dmg
            out/make/**/*.zip
          retention-days: 7

  build-macos-x64:
    name: Build macOS (x64)
    needs: prepare
    runs-on: macos-latest
    if: contains(needs.prepare.outputs.platforms, 'macos')

    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.SOURCE_REPO }}
          ref: ${{ needs.prepare.outputs.ref }}
          token: ${{ secrets.SOURCE_REPO_PAT }}
          submodules: recursive

      - name: Inject version
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '${{ needs.prepare.outputs.version }}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Gemini CLI
        run: pnpm run build:gemini

      - name: Check code signing
        id: signing
        run: |
          if [ -n "$APPLE_CERTIFICATE" ]; then
            echo "available=true" >> $GITHUB_OUTPUT
          else
            echo "available=false" >> $GITHUB_OUTPUT
          fi
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}

      - name: Import Certificate
        if: steps.signing.outputs.available == 'true'
        uses: apple-actions/import-codesign-certs@v2
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Build x64
        run: pnpm run forge:make:x64
        env:
          NODE_OPTIONS: --max-old-space-size=8192
          BUILD_OBFUSCATE: "true"
          APPLE_IDENTITY: ${{ steps.signing.outputs.available == 'true' && secrets.APPLE_IDENTITY || '' }}
          APPLE_ID: ${{ steps.signing.outputs.available == 'true' && secrets.APPLE_ID || '' }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ steps.signing.outputs.available == 'true' && secrets.APPLE_APP_SPECIFIC_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ steps.signing.outputs.available == 'true' && secrets.APPLE_TEAM_ID || '' }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nightly-macos-x64
          path: |
            out/make/**/*.dmg
            out/make/**/*.zip
          retention-days: 7

  build-windows:
    name: Build Windows (x64)
    needs: prepare
    runs-on: windows-latest
    if: contains(needs.prepare.outputs.platforms, 'windows')

    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.SOURCE_REPO }}
          ref: ${{ needs.prepare.outputs.ref }}
          token: ${{ secrets.SOURCE_REPO_PAT }}
          submodules: recursive

      - name: Inject version
        shell: bash
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '${{ needs.prepare.outputs.version }}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Gemini CLI
        run: pnpm run build:gemini

      - name: Build and package
        run: pnpm run forge:make
        env:
          NODE_OPTIONS: --max-old-space-size=8192
          BUILD_OBFUSCATE: "true"

      - name: Normalize EXE filename (spaces to dashes)
        shell: bash
        run: |
          find out/make -name "*.exe" | while read f; do
            dir=$(dirname "$f")
            base=$(basename "$f")
            newname=$(echo "$base" | tr ' ' '-')
            if [ "$base" != "$newname" ]; then
              mv "$f" "$dir/$newname"
              echo "Renamed: $base -> $newname"
            fi
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nightly-windows-x64
          path: |
            out/make/**/*.exe
          retention-days: 7
          if-no-files-found: error

  upload:
    name: Publish Nightly
    needs: [prepare, build-macos-arm64, build-macos-x64, build-windows]
    runs-on: ubuntu-latest
    if: |
      always() &&
      (needs.build-macos-arm64.result == 'success' || needs.build-macos-x64.result == 'success' || needs.build-windows.result == 'success')

    steps:
      - name: Checkout source repo (for scripts)
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.SOURCE_REPO }}
          ref: ${{ needs.prepare.outputs.ref }}
          token: ${{ secrets.SOURCE_REPO_PAT }}

      - name: Download release notes
        uses: actions/download-artifact@v4
        with:
          name: nightly-release-notes
          path: /tmp/

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: nightly-*
          path: artifacts/

      - name: Collect artifacts
        run: |
          mkdir -p out/make dist
          find artifacts/ -type f \( -name "*.dmg" -o -name "*.zip" -o -name "*.exe" \) -exec cp {} out/make/ \;
          echo "📦 Nightly artifacts:"
          ls -la out/make/

      - name: Generate macOS Update Metadata
        if: needs.build-macos-arm64.result == 'success' || needs.build-macos-x64.result == 'success'
        run: |
          chmod +x scripts/generate-latest-yml.sh
          ./scripts/generate-latest-yml.sh --platform mac

      - name: Generate Windows Update Metadata
        if: needs.build-windows.result == 'success'
        run: |
          chmod +x scripts/generate-latest-yml.sh
          EXE_FILE=$(find out/make -name "*.exe" | head -1)
          [ -n "$EXE_FILE" ] && ./scripts/generate-latest-yml.sh --platform win "$EXE_FILE"

      - name: Create Nightly Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly-${{ needs.prepare.outputs.version }}
          name: "Nightly ${{ needs.prepare.outputs.version }}"
          body_path: /tmp/release_notes.md
          draft: false
          prerelease: true
          files: |
            out/make/*.dmg
            out/make/*.zip
            out/make/*.exe
            dist/latest-mac.yml
            dist/latest.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
