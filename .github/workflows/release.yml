            sleep 10
          done
        env:
          NODE_OPTIONS: --max-old-space-size=8192
          BUILD_OBFUSCATE: "true"
          APPLE_IDENTITY: ${{ steps.signing.outputs.available == 'true' && secrets.APPLE_IDENTITY || '' }}
          APPLE_ID: ${{ steps.signing.outputs.available == 'true' && secrets.APPLE_ID || '' }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ steps.signing.outputs.available == 'true' && secrets.APPLE_APP_SPECIFIC_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ steps.signing.outputs.available == 'true' && secrets.APPLE_TEAM_ID || '' }}

      - name: Collect x64 production artifacts
        shell: bash
        run: |
          mkdir -p dist/macos-x64
          find out/make -type f \( -name "*.dmg" -o -name "*.zip" \) -exec cp {} dist/macos-x64/ \;
          echo "✅ macOS x64 production artifacts:"
          find dist/macos-x64 -maxdepth 1 -type f | while read f; do echo "  - $(basename "$f")"; done

      - name: Upload x64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-x64-build
          path: |
            dist/macos-x64/*
          retention-days: 3
          if-no-files-found: error

  # ===========================================
  # Windows Build - x64
  # ===========================================
  build-windows:
    name: Build Windows (x64)
    needs: prepare
    runs-on: windows-latest
    if: inputs.notify_only == false && needs.prepare.outputs.package_set != 'launcher' && contains(inputs.platforms, 'windows')

    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.SOURCE_REPO }}
          ref: ${{ inputs.repo_ref }}
          token: ${{ secrets.SOURCE_REPO_PAT }}

      - name: Inject test build .env
        if: inputs.build_profile == 'test'
        shell: bash
        env:
          TEST_BUILD_ENV_FILE: ${{ secrets.TEST_BUILD_ENV_FILE }}
        run: |
          set -euo pipefail
          if [ -z "${TEST_BUILD_ENV_FILE:-}" ]; then
            echo "::error::TEST_BUILD_ENV_FILE secret is required when build_profile=test"
            exit 1
          fi
          while IFS= read -r line; do
            [ -n "$line" ] && echo "::add-mask::$line"
          done <<< "$TEST_BUILD_ENV_FILE"
          printf '%s\n' "$TEST_BUILD_ENV_FILE" > .env
          entry_count=$(grep -Ec '^[[:space:]]*[A-Za-z_][A-Za-z0-9_]*=' .env || true)
          echo "✅ Injected test build .env (${entry_count} entries)."

      - name: Inject version into package.json
        shell: bash
        run: |
          VERSION="${{ inputs.version }}"
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '$VERSION';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify Racent signtool present
        if: inputs.is_rc == false && inputs.build_profile == 'release'
        shell: pwsh
        run: |
          $tool = "build/signing/signtool-amd64.exe"
          if (-not (Test-Path $tool)) {
            Write-Error "$tool not found in source repo. Commit Racent signtool to aoe-desktop at $tool."
            exit 1
          }
          $size = (Get-Item $tool).Length
          if ($size -lt 100000) {
            Write-Error "$tool looks too small ($size bytes). Likely a Git LFS pointer or corrupted file."
            exit 1
          }
          Write-Host "Racent signtool present: $tool ($([math]::Round($size / 1MB, 2)) MB)"

      - name: Build and package (Windows x64)
        run: pnpm run forge:make
        env:
          BUILD_OBFUSCATE: "true"
          SIGNTOOL_ACCESS_KEY: ${{ inputs.is_rc == false && inputs.build_profile == 'release' && secrets.ACCESS_KEY || '' }}
          SIGNTOOL_ACCESS_SECRET: ${{ inputs.is_rc == false && inputs.build_profile == 'release' && secrets.ACCESS_SECRET || '' }}
          SIGNTOOL_CERT_CODE: ${{ inputs.is_rc == false && inputs.build_profile == 'release' && secrets.CERT_CODE || '' }}

      - name: Collect production Windows artifact
        shell: bash
        run: |
          mkdir -p dist/windows
          find out/make -name "*.exe" | while read f; do
            dir=$(dirname "$f")
            base=$(basename "$f")
            newname=$(echo "$base" | tr ' ' '-')
            if [ "$base" != "$newname" ]; then
              mv "$f" "$dir/$newname"
              echo "Renamed: $base -> $newname"
            fi
          done
          PROD_EXE=$(find out/make -type f -name "*.exe" | head -1)
          [ -n "$PROD_EXE" ] || { echo "Production EXE not found"; exit 1; }
          cp "$PROD_EXE" "dist/windows/"
          echo "✅ Production Windows artifact: $(basename "$PROD_EXE")"

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64-build
          path: |
            dist/windows/*.exe
          retention-days: 3
          if-no-files-found: error

  # ===========================================
  # Test Launcher - macOS arm64
  # ===========================================
  build-test-launcher-macos-arm64:
    name: Test Launcher macOS (arm64)
    needs: prepare
    runs-on: macos-latest
    if: inputs.notify_only == false && needs.prepare.outputs.package_set != 'app' && contains(inputs.platforms, 'macos')

    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.SOURCE_REPO }}
          ref: ${{ inputs.repo_ref }}
          token: ${{ secrets.SOURCE_REPO_PAT }}

      - name: Inject test build .env
        if: inputs.build_profile == 'test'
        shell: bash
        env:
          TEST_BUILD_ENV_FILE: ${{ secrets.TEST_BUILD_ENV_FILE }}
        run: |
          set -euo pipefail
          if [ -z "${TEST_BUILD_ENV_FILE:-}" ]; then
            echo "::error::TEST_BUILD_ENV_FILE secret is required when build_profile=test"
            exit 1
          fi
          while IFS= read -r line; do
            [ -n "$line" ] && echo "::add-mask::$line"
          done <<< "$TEST_BUILD_ENV_FILE"
          printf '%s\n' "$TEST_BUILD_ENV_FILE" > .env
          entry_count=$(grep -Ec '^[[:space:]]*[A-Za-z_][A-Za-z0-9_]*=' .env || true)
          echo "✅ Injected test build .env (${entry_count} entries)."

      - name: Inject version into package.json
        run: |
          VERSION="${{ inputs.version }}"
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '$VERSION';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check code signing availability
        id: signing
        run: |
          set -euo pipefail
          missing=()
          for name in APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD APPLE_IDENTITY APPLE_ID APPLE_APP_SPECIFIC_PASSWORD APPLE_TEAM_ID; do
            if [ -z "${!name:-}" ]; then
              missing+=("$name")
            fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::Missing macOS test launcher signing/notarization secrets: ${missing[*]}"
            exit 1
          fi
          echo "available=true" >> $GITHUB_OUTPUT
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_IDENTITY: ${{ secrets.APPLE_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Import Code Signing Certificate
        if: steps.signing.outputs.available == 'true'
        uses: apple-actions/import-codesign-certs@v2
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Package test launcher (macOS arm64)
        run: pnpm run package:test-launcher:macos
        env:
          NODE_OPTIONS: --max-old-space-size=8192
          APPLE_IDENTITY: ${{ steps.signing.outputs.available == 'true' && secrets.APPLE_IDENTITY || '' }}
          APPLE_ID: ${{ steps.signing.outputs.available == 'true' && secrets.APPLE_ID || '' }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ steps.signing.outputs.available == 'true' && secrets.APPLE_APP_SPECIFIC_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ steps.signing.outputs.available == 'true' && secrets.APPLE_TEAM_ID || '' }}
          REQUIRE_TEST_LAUNCHER_NOTARIZE: "true"

      - name: Verify notarized test launcher (macOS arm64)
        shell: bash
        run: |
          set -euo pipefail
          ZIP="tools/floatboat-test-launcher/floatboat-test-launcher-macos.zip"
          VERIFY_DIR="$(mktemp -d)"
          ditto -x -k "$ZIP" "$VERIFY_DIR"
          APP="$VERIFY_DIR/floatboat-test-launcher/Floatboat Test Launcher.app"
          INNER_APP="$APP/Contents/Resources/floatboat-test-launcher/app/Floatboat.app"
          test -d "$APP" || { echo "::error::Launcher app not found in $ZIP"; exit 1; }
          test -d "$INNER_APP" || { echo "::error::Bundled Floatboat.app not found in $ZIP"; exit 1; }
          codesign --verify --deep --strict --verbose=4 "$INNER_APP"
          codesign --verify --deep --strict --verbose=4 "$APP"
          xcrun stapler validate "$APP"
          spctl --assess --type execute --verbose=4 "$APP"

      - name: Collect test launcher artifact
        shell: bash
        run: |
          VERSION="${{ inputs.version }}"
          SRC="tools/floatboat-test-launcher/floatboat-test-launcher-macos.zip"
          [ -f "$SRC" ] || { echo "Launcher zip not found: $SRC"; exit 1; }
          mkdir -p dist/launchers
          cp "$SRC" "dist/launchers/floatboat-test-launcher-${VERSION}-macos-arm64.zip"
          echo "✅ Test launcher (macOS arm64): floatboat-test-launcher-${VERSION}-macos-arm64.zip"

      - name: Upload test launcher artifact
        uses: actions/upload-artifact@v4
        with:
          name: test-launcher-macos-arm64
          path: dist/launchers/*.zip
          retention-days: 3
          if-no-files-found: error

  # ===========================================
  # Test Launcher - macOS x64 (Intel runner)
  # ===========================================
  build-test-launcher-macos-x64:
    name: Test Launcher macOS (x64)
    needs: prepare
