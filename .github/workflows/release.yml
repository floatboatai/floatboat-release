name: Release

on:
  workflow_dispatch:
    inputs:
      repo_ref:
        description: 'Git ref to build (tag, branch, or commit SHA)'
        required: true
        type: string
      version:
        description: 'Version string (e.g., 0.2.2-rc.1)'
        required: true
        type: string
      platforms:
        description: 'Platforms to build'
        required: false
        default: 'macos,windows'
        type: choice
        options:
          - 'macos,windows'
          - 'macos'
          - 'windows'
      is_rc:
        description: 'Is this a Release Candidate?'
        required: false
        default: true
        type: boolean

permissions:
  contents: write
  actions: read

jobs:
  # ===========================================
  # Prepare
  # ===========================================
  prepare:
    name: Prepare Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ inputs.version }}
      is_rc: ${{ inputs.is_rc }}
      platforms: ${{ inputs.platforms }}
      changelog_file: ${{ steps.changelog.outputs.changelog_file }}
      prev_tag: ${{ steps.changelog.outputs.prev_tag }}

    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.SOURCE_REPO }}
          ref: ${{ inputs.repo_ref }}
          token: ${{ secrets.SOURCE_REPO_PAT }}
          fetch-depth: 0
          submodules: recursive

      - name: Inject version into package.json
        run: |
          VERSION="${{ inputs.version }}"
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '$VERSION';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          echo "✅ package.json version set to $VERSION"

      - name: Generate changelog
        id: changelog
        run: |
          set -e
          VERSION="${{ inputs.version }}"
          IS_RC="${{ inputs.is_rc }}"
          CURRENT_TAG="v${VERSION}"

          echo "🔍 Finding previous tag for ${CURRENT_TAG} (is_rc=${IS_RC})"

          if [ "$IS_RC" == "true" ]; then
            # Extract base version (e.g., 0.4.1 from 0.4.1-rc.12)
            BASE_VERSION=$(echo "$VERSION" | sed 's/-rc\.[0-9]*$//')
            # Find previous RC for this base version
            PREV_TAG=$(git tag -l "v${BASE_VERSION}-rc.*" --sort=-v:refname | grep -v "^${CURRENT_TAG}$" | head -1)
            if [ -z "$PREV_TAG" ]; then
              # First RC: compare to previous official release
              PREV_TAG=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
              echo "  → First RC for ${BASE_VERSION}, comparing to previous release: ${PREV_TAG:-none}"
            else
              echo "  → Previous RC: ${PREV_TAG}"
            fi
          else
            # Official release: find previous official release
            PREV_TAG=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | grep -v "^${CURRENT_TAG}$" | head -1)
            echo "  → Previous release: ${PREV_TAG:-none}"
          fi

          if [ -z "$PREV_TAG" ]; then
            CHANGELOG_FILE="changelog-initial-${CURRENT_TAG}.md"
          else
            CHANGELOG_FILE="changelog-${PREV_TAG}-${CURRENT_TAG}.md"
          fi

          echo "changelog_file=${CHANGELOG_FILE}" >> $GITHUB_OUTPUT
          echo "prev_tag=${PREV_TAG}" >> $GITHUB_OUTPUT

          # Generate changelog content
          {
            if [ "$IS_RC" == "true" ]; then
              echo "# Release Candidate ${CURRENT_TAG}"
            else
              echo "# Release ${CURRENT_TAG}"
            fi
            echo ""

            if [ -n "$PREV_TAG" ]; then
              echo "**Changes since ${PREV_TAG}:**"
              echo ""
              git log "${PREV_TAG}..${CURRENT_TAG}" --no-merges --format="- %s" | head -200
            else
              echo "_This is the initial release — no previous tag found._"
            fi

            echo ""
            echo "---"
            echo "*Generated $(date -u '+%Y-%m-%d %H:%M UTC') · [View on GitHub](https://github.com/${{ github.repository }}/releases/tag/${CURRENT_TAG})*"
          } > "/tmp/${CHANGELOG_FILE}"

          echo ""
          echo "✅ Changelog: ${CHANGELOG_FILE}"
          echo "--- Content preview ---"
          head -30 "/tmp/${CHANGELOG_FILE}"
          echo "---"

      - name: Commit changelog to source repo
        continue-on-error: true
        run: |
          CHANGELOG_FILE="${{ steps.changelog.outputs.changelog_file }}"
          SOURCE_REPO="${{ vars.SOURCE_REPO }}"
          PAT="${{ secrets.SOURCE_REPO_PAT }}"

          echo "📝 Committing ${CHANGELOG_FILE} to source repo..."

          TMPDIR_CLONE=$(mktemp -d)
          git clone "https://x-access-token:${PAT}@github.com/${SOURCE_REPO}.git" \
            "$TMPDIR_CLONE" --branch dev --depth 1 --quiet

          mkdir -p "$TMPDIR_CLONE/changelogs"
          cp "/tmp/${CHANGELOG_FILE}" "$TMPDIR_CLONE/changelogs/${CHANGELOG_FILE}"

          cd "$TMPDIR_CLONE"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "changelogs/${CHANGELOG_FILE}"

          if git diff --staged --quiet; then
            echo "ℹ️  Changelog already exists in repo, skipping commit"
          else
            git commit -m "chore: add ${CHANGELOG_FILE}"
            git push origin dev
            echo "✅ Changelog committed to dev branch"
          fi

      - name: Upload changelog artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-changelog
          path: /tmp/changelog-*.md
          retention-days: 7

  # ===========================================
  # macOS Build - arm64 (Apple Silicon)
  # ===========================================
  build-macos-arm64:
    name: Build macOS (arm64)
    needs: prepare
    runs-on: macos-latest
    if: contains(inputs.platforms, 'macos')

    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.SOURCE_REPO }}
          ref: ${{ inputs.repo_ref }}
          token: ${{ secrets.SOURCE_REPO_PAT }}
          submodules: recursive

      - name: Inject version into package.json
        run: |
          VERSION="${{ inputs.version }}"
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '$VERSION';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Gemini CLI
        run: pnpm run build:gemini

      - name: Check code signing availability
        id: signing
        run: |
          if [ -n "$APPLE_CERTIFICATE" ]; then
            echo "available=true" >> $GITHUB_OUTPUT
          else
            echo "available=false" >> $GITHUB_OUTPUT
          fi
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}

      - name: Import Code Signing Certificate
        if: steps.signing.outputs.available == 'true'
        uses: apple-actions/import-codesign-certs@v2
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Build and package (arm64 production)
        run: pnpm run forge:make:arm64
        env:
          NODE_OPTIONS: --max-old-space-size=8192
          BUILD_OBFUSCATE: "true"
          APPLE_IDENTITY: ${{ steps.signing.outputs.available == 'true' && secrets.APPLE_IDENTITY || '' }}
          APPLE_ID: ${{ steps.signing.outputs.available == 'true' && secrets.APPLE_ID || '' }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ steps.signing.outputs.available == 'true' && secrets.APPLE_APP_SPECIFIC_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ steps.signing.outputs.available == 'true' && secrets.APPLE_TEAM_ID || '' }}

      - name: Collect arm64 production artifacts
        shell: bash
        run: |
          mkdir -p dist/macos-arm64
          find out/make -type f \( -name "*.dmg" -o -name "*.zip" \) -exec cp {} dist/macos-arm64/ \;
          echo "✅ macOS arm64 production artifacts:"
          find dist/macos-arm64 -maxdepth 1 -type f | while read f; do echo "  - $(basename "$f")"; done

      - name: Upload arm64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64-build
          path: |
            dist/macos-arm64/*
          retention-days: 3

  # ===========================================
  # macOS Build - x64 (Intel)
  # ===========================================
  build-macos-x64:
    name: Build macOS (x64)
    needs: prepare
    runs-on: macos-latest
    if: contains(inputs.platforms, 'macos')

    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.SOURCE_REPO }}
          ref: ${{ inputs.repo_ref }}
          token: ${{ secrets.SOURCE_REPO_PAT }}
          submodules: recursive

      - name: Inject version into package.json
        run: |
          VERSION="${{ inputs.version }}"
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '$VERSION';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Gemini CLI
        run: pnpm run build:gemini

      - name: Check code signing availability
        id: signing
        run: |
          if [ -n "$APPLE_CERTIFICATE" ]; then
            echo "available=true" >> $GITHUB_OUTPUT
          else
            echo "available=false" >> $GITHUB_OUTPUT
          fi
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}

      - name: Import Code Signing Certificate
        if: steps.signing.outputs.available == 'true'
        uses: apple-actions/import-codesign-certs@v2
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Build and package (x64 production)
        run: pnpm run forge:make:x64
        env:
          NODE_OPTIONS: --max-old-space-size=8192
          BUILD_OBFUSCATE: "true"
          APPLE_IDENTITY: ${{ steps.signing.outputs.available == 'true' && secrets.APPLE_IDENTITY || '' }}
          APPLE_ID: ${{ steps.signing.outputs.available == 'true' && secrets.APPLE_ID || '' }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ steps.signing.outputs.available == 'true' && secrets.APPLE_APP_SPECIFIC_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ steps.signing.outputs.available == 'true' && secrets.APPLE_TEAM_ID || '' }}

      - name: Collect x64 production artifacts
        shell: bash
        run: |
          mkdir -p dist/macos-x64
          find out/make -type f \( -name "*.dmg" -o -name "*.zip" \) -exec cp {} dist/macos-x64/ \;
          echo "✅ macOS x64 production artifacts:"
          find dist/macos-x64 -maxdepth 1 -type f | while read f; do echo "  - $(basename "$f")"; done

      - name: Upload x64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-x64-build
          path: |
            dist/macos-x64/*
          retention-days: 3

  # ===========================================
  # Windows Build - x64
  # ===========================================
  build-windows:
    name: Build Windows (x64)
    needs: prepare
    runs-on: windows-latest
    if: contains(inputs.platforms, 'windows')

    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.SOURCE_REPO }}
          ref: ${{ inputs.repo_ref }}
          token: ${{ secrets.SOURCE_REPO_PAT }}
          submodules: recursive

      - name: Inject version into package.json
        shell: bash
        run: |
          VERSION="${{ inputs.version }}"
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '$VERSION';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Gemini CLI
        run: pnpm run build:gemini

      - name: Verify Racent signtool present
        shell: pwsh
        run: |
          $tool = "build/signing/signtool-amd64.exe"
          if (-not (Test-Path $tool)) {
            Write-Error "$tool not found in source repo. Commit Racent signtool to aoe-desktop at $tool."
            exit 1
          }
          $size = (Get-Item $tool).Length
          if ($size -lt 100000) {
            Write-Error "$tool looks too small ($size bytes). Likely a Git LFS pointer or corrupted file."
            exit 1
          }
          Write-Host "Racent signtool present: $tool ($([math]::Round($size / 1MB, 2)) MB)"

      - name: Build, package and sign (production)
        run: pnpm run forge:make
        env:
          BUILD_OBFUSCATE: "true"
          SIGNTOOL_ACCESS_KEY: ${{ secrets.ACCESS_KEY }}
          SIGNTOOL_ACCESS_SECRET: ${{ secrets.ACCESS_SECRET }}
          SIGNTOOL_CERT_CODE: ${{ secrets.CERT_CODE }}

      - name: Collect production Windows artifact
        shell: bash
        run: |
          mkdir -p dist/windows
          find out/make -name "*.exe" | while read f; do
            dir=$(dirname "$f")
            base=$(basename "$f")
            newname=$(echo "$base" | tr ' ' '-')
            if [ "$base" != "$newname" ]; then
              mv "$f" "$dir/$newname"
              echo "Renamed: $base -> $newname"
            fi
          done
          PROD_EXE=$(find out/make -type f -name "*.exe" | head -1)
          [ -n "$PROD_EXE" ] || { echo "Production EXE not found"; exit 1; }
          cp "$PROD_EXE" "dist/windows/"
          echo "✅ Production Windows artifact: $(basename "$PROD_EXE")"

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64-build
          path: |
            dist/windows/*.exe
          retention-days: 3
          if-no-files-found: error

  # ===========================================
  # Collect & Publish Release
  # ===========================================
  upload:
    name: Upload All Artifacts
    needs: [prepare, build-macos-arm64, build-macos-x64, build-windows]
    runs-on: ubuntu-latest
    if: |
      always() &&
      (needs.build-macos-arm64.result == 'success' || needs.build-macos-x64.result == 'success' || needs.build-windows.result == 'success')

    steps:
      - name: Checkout source repo (for scripts)
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.SOURCE_REPO }}
          ref: ${{ inputs.repo_ref }}
          token: ${{ secrets.SOURCE_REPO_PAT }}

      - name: Download changelog
        uses: actions/download-artifact@v4
        with:
          name: release-changelog
          path: /tmp/changelog/

      - name: Download macOS arm64 artifacts
        if: needs.build-macos-arm64.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: macos-arm64-build
          path: artifacts/macos-arm64/

      - name: Download macOS x64 artifacts
        if: needs.build-macos-x64.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: macos-x64-build
          path: artifacts/macos-x64/

      - name: Download Windows artifacts
        if: needs.build-windows.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: windows-x64-build
          path: artifacts/windows/

      - name: Collect all artifacts into out/make
        run: |
          mkdir -p out/make dist

          echo "📦 Collected artifacts:"

          if [ -d "artifacts/macos-arm64" ]; then
            find artifacts/macos-arm64 -type f \( -name "*.dmg" -o -name "*.zip" \) -exec cp {} out/make/ \;
            echo "  ✅ macOS arm64:"
            find artifacts/macos-arm64 -type f | while read f; do echo "     $(basename "$f")"; done
          fi

          if [ -d "artifacts/macos-x64" ]; then
            find artifacts/macos-x64 -type f \( -name "*.dmg" -o -name "*.zip" \) -exec cp {} out/make/ \;
            echo "  ✅ macOS x64:"
            find artifacts/macos-x64 -type f | while read f; do echo "     $(basename "$f")"; done
          fi

          if [ -d "artifacts/windows" ]; then
            find artifacts/windows -type f -name "*.exe" -exec cp {} out/make/ \;
            echo "  ✅ Windows x64:"
            find artifacts/windows -type f | while read f; do echo "     $(basename "$f")"; done
          fi

          echo ""
          echo "📦 Final out/make contents:"
          ls -la out/make/

      - name: Generate macOS Update Metadata
        if: needs.build-macos-arm64.result == 'success' || needs.build-macos-x64.result == 'success'
        run: |
          chmod +x scripts/generate-latest-yml.sh
          rm -rf meta-work
          mkdir -p meta-work/out/make meta-work/dist
          find out/make -type f \( -name "*.dmg" -o -name "*.zip" \) -exec cp {} meta-work/out/make/ \;
          (
            cd meta-work
            ../scripts/generate-latest-yml.sh --platform mac
          )
          cp meta-work/dist/latest-mac.yml dist/latest-mac.yml

      - name: Generate Windows Update Metadata
        if: needs.build-windows.result == 'success'
        run: |
          chmod +x scripts/generate-latest-yml.sh
          EXE_FILE=$(find out/make -name "*.exe" | head -1)
          [ -n "$EXE_FILE" ] && ./scripts/generate-latest-yml.sh --platform win "$EXE_FILE"

      - name: Resolve changelog path for release body
        id: release_body
        run: |
          CHANGELOG=$(find /tmp/changelog -name "changelog-*.md" 2>/dev/null | head -1)
          if [ -n "$CHANGELOG" ]; then
            echo "path=${CHANGELOG}" >> $GITHUB_OUTPUT
          else
            echo "Release v${{ inputs.version }}" > /tmp/release_notes.md
            echo "path=/tmp/release_notes.md" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: ${{ inputs.is_rc == true && format('RC v{0}', inputs.version) || format('Release v{0}', inputs.version) }}
          body_path: ${{ steps.release_body.outputs.path }}
          draft: false
          prerelease: ${{ inputs.is_rc }}
          files: |
            out/make/*.dmg
            out/make/*.zip
            out/make/*.exe
            dist/latest-mac.yml
            dist/latest.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ===========================================
      # S3 Deploy (official releases only)
      # ===========================================
      - name: Configure AWS Credentials
        if: inputs.is_rc == false
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Upload installers to S3
        if: inputs.is_rc == false
        run: |
          echo "📤 Uploading installers to S3..."

          # Upload all installer files
          for f in out/make/*.dmg out/make/*.zip out/make/*.exe; do
            [ -f "$f" ] || continue
            filename=$(basename "$f")
            echo "  Uploading: $filename"
            aws s3 cp "$f" "s3://aoe-desktop-releases/$filename" --no-progress
          done

          # Upload update metadata
          for f in dist/latest-mac.yml dist/latest.yml; do
            [ -f "$f" ] || continue
            filename=$(basename "$f")
            echo "  Uploading: $filename"
            aws s3 cp "$f" "s3://aoe-desktop-releases/$filename" --no-progress
          done

          echo ""
          echo "✅ S3 upload complete. Uploaded files:"
          aws s3 ls "s3://aoe-desktop-releases/" | grep "${{ inputs.version }}" || true
          aws s3 ls "s3://aoe-desktop-releases/latest" || true

      - name: Invalidate CloudFront cache
        if: inputs.is_rc == false
        run: |
          INVALIDATION=$(aws cloudfront create-invalidation \
            --distribution-id EOFLQQ0A8KCX1 \
            --paths "/*" \
            --output json)

          echo "$INVALIDATION" | jq '{Id: .Invalidation.Id, Status: .Invalidation.Status, CreateTime: .Invalidation.CreateTime}'
          echo "✅ CloudFront invalidation created"

  # ===========================================
  # Release Summary & Feishu Notification
  # ===========================================
  notify:
    name: Release Summary
    needs: [prepare, build-macos-arm64, build-macos-x64, build-windows, upload]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Download changelog
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: release-changelog
          path: /tmp/changelog/

      - name: Summary
        run: |
          echo "=========================================="
          echo "       ${{ inputs.is_rc == true && 'RC' || 'Release' }} v${{ inputs.version }}"
          echo "=========================================="
          echo ""
          echo "📦 Build Results:"
          echo "   macOS arm64:  ${{ needs.build-macos-arm64.result || 'skipped' }}"
          echo "   macOS x64:    ${{ needs.build-macos-x64.result || 'skipped' }}"
          echo "   Windows x64:  ${{ needs.build-windows.result || 'skipped' }}"
          echo ""
          echo "📤 Upload:       ${{ needs.upload.result || 'skipped' }}"
          if [ "${{ inputs.is_rc }}" != "true" ]; then
          echo "☁️  S3 Deploy:    included in upload job"
          echo "🌐 CDN:          https://release.aoe.chat/"
          fi
          echo ""
          echo "🔗 https://github.com/${{ github.repository }}/releases/tag/v${{ inputs.version }}"

      - name: Send Feishu notification
        run: |
          python3 << 'PYEOF'
          import json, urllib.request, glob, os, sys

          version = "${{ inputs.version }}"
          is_rc = "${{ inputs.is_rc }}" == "true"
          repo = "${{ github.repository }}"
          prev_tag = "${{ needs.prepare.outputs.prev_tag }}"

          macos_arm64 = "${{ needs.build-macos-arm64.result }}" or "skipped"
          macos_x64   = "${{ needs.build-macos-x64.result }}"   or "skipped"
          windows     = "${{ needs.build-windows.result }}"     or "skipped"
          upload      = "${{ needs.upload.result }}"            or "skipped"

          # Read changelog
          changelog_files = glob.glob("/tmp/changelog/changelog-*.md")
          if changelog_files:
              with open(changelog_files[0], encoding="utf-8") as f:
                  changelog = f.read()
          else:
              changelog = "_Changelog not available._"

          # Truncate to stay within Feishu message limits (~4000 chars for text)
          MAX_LEN = 3500
          if len(changelog) > MAX_LEN:
              changelog = changelog[:MAX_LEN] + "\n\n_...(内容已截断，完整版见 Release 页)_"

          def icon(s):
              return {"success": "✅", "failure": "❌", "cancelled": "⏹️", "skipped": "⏭️"}.get(s, "❓")

          emoji = "🚧" if is_rc else "🎉"
          release_type = "RC 预发布" if is_rc else "正式发布"
          range_hint = f"  (since {prev_tag})" if prev_tag else ""

          text = f"""{emoji} AOE Desktop {release_type} v{version}

          构建结果：
            macOS arm64：{icon(macos_arm64)} {macos_arm64}
            macOS x64：  {icon(macos_x64)} {macos_x64}
            Windows x64：{icon(windows)} {windows}
            上传：       {icon(upload)} {upload}

          🔗 https://github.com/{repo}/releases/tag/v{version}

          ────────────────────────
          {changelog}"""

          # De-indent (Python heredoc adds leading spaces)
          import textwrap
          text = textwrap.dedent(text).strip()

          payload = json.dumps({
              "msg_type": "text",
              "content": {"text": text}
          }, ensure_ascii=False)

          req = urllib.request.Request(
