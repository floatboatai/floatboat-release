name: Release

on:
  workflow_dispatch:
    inputs:
      repo_ref:
        description: "Git ref to build (tag, branch, or commit SHA)"
        required: true
        type: string
      version:
        description: "Version string (e.g., 0.2.2-rc.1)"
        required: true
        type: string
      platforms:
        description: "Platforms to build"
        required: false
        default: "macos,windows"
        type: choice
        options:
          - "macos,windows"
          - "macos"
          - "windows"
      is_rc:
        description: "Is this a Release Candidate?"
        required: false
        default: true
        type: boolean
      notify_only:
        description: "Only send the internal Feishu release note; skip build/upload/GitHub Release mutation"
        required: false
        default: false
        type: boolean
      build_profile:
        description: "Build profile (test injects TEST_BUILD_ENV_FILE into .env)"
        required: false
        default: "release"
        type: choice
        options:
          - "release"
          - "test"
      package_set:
        description: "Package set to build (auto: test=app, release=all)"
        required: false
        default: "auto"
        type: choice
        options:
          - "auto"
          - "app"
          - "launcher"
          - "all"
      promote_merged_bugs:
        description: "Promote merged dev bug PRs to acceptance after app packaging succeeds"
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  actions: read

jobs:
  # ===========================================
  # Prepare
  # ===========================================
  prepare:
    name: Prepare Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ inputs.version }}
      is_rc: ${{ inputs.is_rc }}
      platforms: ${{ inputs.platforms }}
      build_profile: ${{ inputs.build_profile }}
      package_set: ${{ steps.package_set.outputs.package_set }}
      changelog_file: ${{ steps.changelog.outputs.changelog_file }}
      prev_tag: ${{ steps.changelog.outputs.prev_tag }}

    steps:
      - name: Resolve package set
        id: package_set
        shell: bash
        run: |
          package_set="${{ inputs.package_set }}"
          if [ "$package_set" = "auto" ]; then
            if [ "${{ inputs.build_profile }}" = "test" ]; then
              package_set="app"
            else
              package_set="all"
            fi
          fi
          echo "package_set=$package_set" >> "$GITHUB_OUTPUT"
          echo "📦 Package set: $package_set"

      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.SOURCE_REPO }}
          ref: ${{ inputs.repo_ref }}
          token: ${{ secrets.SOURCE_REPO_PAT }}
          fetch-depth: 0

      - name: Inject version into package.json
        run: |
          VERSION="${{ inputs.version }}"
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '$VERSION';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          echo "✅ package.json version set to $VERSION"

      - name: Generate changelog
        id: changelog
        run: |
          set -e
          VERSION="${{ inputs.version }}"
          IS_RC="${{ inputs.is_rc }}"
          CURRENT_TAG="v${VERSION}"

          echo "🔍 Finding previous tag for ${CURRENT_TAG} (is_rc=${IS_RC})"

          if [ "$IS_RC" == "true" ]; then
            # Extract base version (e.g., 0.4.1 from 0.4.1-rc.12)
            BASE_VERSION=$(echo "$VERSION" | sed 's/-rc\.[0-9]*$//')
            # Find previous RC for this base version
            PREV_TAG=$(git tag -l "v${BASE_VERSION}-rc.*" --sort=-v:refname | grep -v "^${CURRENT_TAG}$" | head -1)
            if [ -z "$PREV_TAG" ]; then
              # First RC: compare to previous official release
              PREV_TAG=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
              echo "  → First RC for ${BASE_VERSION}, comparing to previous release: ${PREV_TAG:-none}"
            else
              echo "  → Previous RC: ${PREV_TAG}"
            fi
          else
            # Official release: find previous official release
            PREV_TAG=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | grep -v "^${CURRENT_TAG}$" | head -1)
            echo "  → Previous release: ${PREV_TAG:-none}"
          fi

          if [ -z "$PREV_TAG" ]; then
            CHANGELOG_FILE="changelog-initial-${CURRENT_TAG}.md"
          else
            CHANGELOG_FILE="changelog-${PREV_TAG}-${CURRENT_TAG}.md"
          fi

          echo "changelog_file=${CHANGELOG_FILE}" >> $GITHUB_OUTPUT
          echo "prev_tag=${PREV_TAG}" >> $GITHUB_OUTPUT

          # Generate changelog content
          {
            if [ "$IS_RC" == "true" ]; then
              echo "# Release Candidate ${CURRENT_TAG}"
            else
              echo "# Release ${CURRENT_TAG}"
            fi
            echo ""

            if [ -n "$PREV_TAG" ]; then
              echo "**Changes since ${PREV_TAG}:**"
              echo ""
              CHANGES=$(git log "${PREV_TAG}..${CURRENT_TAG}" --no-merges --format="- %s" | head -200)
              if [ -n "$CHANGES" ]; then
                echo "$CHANGES"
              else
                echo "_无更新。_"
              fi
            else
              echo "_This is the initial release — no previous tag found._"
            fi

            echo ""
            echo "---"
            echo "*Generated $(date -u '+%Y-%m-%d %H:%M UTC') · Internal release note for Feishu notification only.*"
          } > "/tmp/${CHANGELOG_FILE}"

          echo ""
          echo "✅ Changelog: ${CHANGELOG_FILE}"
          echo "--- Content preview ---"
          head -30 "/tmp/${CHANGELOG_FILE}"
          echo "---"

      - name: Upload changelog artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-changelog
          path: /tmp/changelog-*.md
          retention-days: 7

  # ===========================================
  # macOS Build - arm64 (Apple Silicon)
  # ===========================================
  build-macos-arm64:
    name: Build macOS (arm64)
    needs: prepare
    runs-on: macos-latest
    if: inputs.notify_only == false && needs.prepare.outputs.package_set != 'launcher' && contains(inputs.platforms, 'macos')

    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.SOURCE_REPO }}
          ref: ${{ inputs.repo_ref }}
          token: ${{ secrets.SOURCE_REPO_PAT }}

      - name: Inject test build .env
        if: inputs.build_profile == 'test'
        shell: bash
        env:
          TEST_BUILD_ENV_FILE: ${{ secrets.TEST_BUILD_ENV_FILE }}
        run: |
          set -euo pipefail
          if [ -z "${TEST_BUILD_ENV_FILE:-}" ]; then
            echo "::error::TEST_BUILD_ENV_FILE secret is required when build_profile=test"
            exit 1
          fi
          while IFS= read -r line; do
            [ -n "$line" ] && echo "::add-mask::$line"
          done <<< "$TEST_BUILD_ENV_FILE"
          printf '%s\n' "$TEST_BUILD_ENV_FILE" > .env
          entry_count=$(grep -Ec '^[[:space:]]*[A-Za-z_][A-Za-z0-9_]*=' .env || true)
          echo "✅ Injected test build .env (${entry_count} entries)."

      - name: Inject version into package.json
        run: |
          VERSION="${{ inputs.version }}"
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '$VERSION';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check code signing availability
        id: signing
        run: |
          if [ -n "$APPLE_CERTIFICATE" ]; then
            echo "available=true" >> $GITHUB_OUTPUT
          else
            echo "available=false" >> $GITHUB_OUTPUT
          fi
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}

      - name: Import Code Signing Certificate
        if: steps.signing.outputs.available == 'true'
        uses: apple-actions/import-codesign-certs@v2
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Build and package (arm64 production)
        run: |
          set -e
          for attempt in 1 2; do
            if pnpm run forge:make:arm64; then
              exit 0
            fi
            exit_code=$?
            if [ "$attempt" -eq 2 ]; then
              exit "$exit_code"
            fi
            echo "::warning::macOS arm64 packaging failed once; cleaning DMG mount state and retrying"
            hdiutil detach /Volumes/Floatboat -force || true
            rm -rf out/make out/Floatboat-darwin-arm64
            sleep 10
          done
        env:
          NODE_OPTIONS: --max-old-space-size=8192
          BUILD_OBFUSCATE: "true"
          APPLE_IDENTITY: ${{ steps.signing.outputs.available == 'true' && secrets.APPLE_IDENTITY || '' }}
          APPLE_ID: ${{ steps.signing.outputs.available == 'true' && secrets.APPLE_ID || '' }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ steps.signing.outputs.available == 'true' && secrets.APPLE_APP_SPECIFIC_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ steps.signing.outputs.available == 'true' && secrets.APPLE_TEAM_ID || '' }}

      - name: Collect arm64 production artifacts
        shell: bash
        run: |
          mkdir -p dist/macos-arm64
          find out/make -type f \( -name "*.dmg" -o -name "*.zip" \) -exec cp {} dist/macos-arm64/ \;
          echo "✅ macOS arm64 production artifacts:"
          find dist/macos-arm64 -maxdepth 1 -type f | while read f; do echo "  - $(basename "$f")"; done

      - name: Upload arm64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64-build
          path: |
            dist/macos-arm64/*
          retention-days: 3
          if-no-files-found: error

  # ===========================================
  # macOS Build - x64 (Intel)
  # ===========================================
  build-macos-x64:
    name: Build macOS (x64)
    needs: prepare
    runs-on: macos-latest
    if: inputs.notify_only == false && needs.prepare.outputs.package_set != 'launcher' && contains(inputs.platforms, 'macos')

    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.SOURCE_REPO }}
          ref: ${{ inputs.repo_ref }}
          token: ${{ secrets.SOURCE_REPO_PAT }}

      - name: Inject test build .env
        if: inputs.build_profile == 'test'
