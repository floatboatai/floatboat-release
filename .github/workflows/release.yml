      - name: Inject test build .env
        if: inputs.build_profile == 'test'
        shell: bash
        env:
          TEST_BUILD_ENV_FILE: ${{ secrets.TEST_BUILD_ENV_FILE }}
        run: |
          set -euo pipefail
          if [ -z "${TEST_BUILD_ENV_FILE:-}" ]; then
            echo "::error::TEST_BUILD_ENV_FILE secret is required when build_profile=test"
            exit 1
          fi
          while IFS= read -r line; do
            [ -n "$line" ] && echo "::add-mask::$line"
          done <<< "$TEST_BUILD_ENV_FILE"
          printf '%s\n' "$TEST_BUILD_ENV_FILE" > .env
          entry_count=$(grep -Ec '^[[:space:]]*[A-Za-z_][A-Za-z0-9_]*=' .env || true)
          echo "✅ Injected test build .env (${entry_count} entries)."

      - name: Inject version into package.json
        run: |
          VERSION="${{ inputs.version }}"
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '$VERSION';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check code signing availability
        id: signing
        run: |
          set -euo pipefail
          missing=()
          for name in APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD APPLE_IDENTITY APPLE_ID APPLE_APP_SPECIFIC_PASSWORD APPLE_TEAM_ID; do
            if [ -z "${!name:-}" ]; then
              missing+=("$name")
            fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::Missing macOS test launcher signing/notarization secrets: ${missing[*]}"
            exit 1
          fi
          echo "available=true" >> $GITHUB_OUTPUT
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_IDENTITY: ${{ secrets.APPLE_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Import Code Signing Certificate
        if: steps.signing.outputs.available == 'true'
        uses: apple-actions/import-codesign-certs@v2
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Package test launcher (macOS x64)
        run: pnpm run package:test-launcher:macos
        env:
          NODE_OPTIONS: --max-old-space-size=8192
          APPLE_IDENTITY: ${{ steps.signing.outputs.available == 'true' && secrets.APPLE_IDENTITY || '' }}
          APPLE_ID: ${{ steps.signing.outputs.available == 'true' && secrets.APPLE_ID || '' }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ steps.signing.outputs.available == 'true' && secrets.APPLE_APP_SPECIFIC_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ steps.signing.outputs.available == 'true' && secrets.APPLE_TEAM_ID || '' }}
          REQUIRE_TEST_LAUNCHER_NOTARIZE: "true"

      - name: Verify notarized test launcher (macOS x64)
        shell: bash
        run: |
          set -euo pipefail
          ZIP="tools/floatboat-test-launcher/floatboat-test-launcher-macos.zip"
          VERIFY_DIR="$(mktemp -d)"
          ditto -x -k "$ZIP" "$VERIFY_DIR"
          APP="$VERIFY_DIR/floatboat-test-launcher/Floatboat Test Launcher.app"
          INNER_APP="$APP/Contents/Resources/floatboat-test-launcher/app/Floatboat.app"
          test -d "$APP" || { echo "::error::Launcher app not found in $ZIP"; exit 1; }
          test -d "$INNER_APP" || { echo "::error::Bundled Floatboat.app not found in $ZIP"; exit 1; }
          codesign --verify --deep --strict --verbose=4 "$INNER_APP"
          codesign --verify --deep --strict --verbose=4 "$APP"
          xcrun stapler validate "$APP"
          spctl --assess --type execute --verbose=4 "$APP"

      - name: Collect test launcher artifact
        shell: bash
        run: |
          VERSION="${{ inputs.version }}"
          SRC="tools/floatboat-test-launcher/floatboat-test-launcher-macos.zip"
          [ -f "$SRC" ] || { echo "Launcher zip not found: $SRC"; exit 1; }
          mkdir -p dist/launchers
          cp "$SRC" "dist/launchers/floatboat-test-launcher-${VERSION}-macos-x64.zip"
          echo "✅ Test launcher (macOS x64): floatboat-test-launcher-${VERSION}-macos-x64.zip"

      - name: Upload test launcher artifact
        uses: actions/upload-artifact@v4
        with:
          name: test-launcher-macos-x64
          path: dist/launchers/*.zip
          retention-days: 3
          if-no-files-found: error

  # ===========================================
  # Test Launcher - Windows x64
  # ===========================================
  build-test-launcher-windows:
    name: Test Launcher Windows (x64)
    needs: prepare
    runs-on: windows-latest
    if: inputs.notify_only == false && needs.prepare.outputs.package_set != 'app' && contains(inputs.platforms, 'windows')

    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.SOURCE_REPO }}
          ref: ${{ inputs.repo_ref }}
          token: ${{ secrets.SOURCE_REPO_PAT }}

      - name: Inject test build .env
        if: inputs.build_profile == 'test'
        shell: bash
        env:
          TEST_BUILD_ENV_FILE: ${{ secrets.TEST_BUILD_ENV_FILE }}
        run: |
          set -euo pipefail
          if [ -z "${TEST_BUILD_ENV_FILE:-}" ]; then
            echo "::error::TEST_BUILD_ENV_FILE secret is required when build_profile=test"
            exit 1
          fi
          while IFS= read -r line; do
            [ -n "$line" ] && echo "::add-mask::$line"
          done <<< "$TEST_BUILD_ENV_FILE"
          printf '%s\n' "$TEST_BUILD_ENV_FILE" > .env
          entry_count=$(grep -Ec '^[[:space:]]*[A-Za-z_][A-Za-z0-9_]*=' .env || true)
          echo "✅ Injected test build .env (${entry_count} entries)."

      - name: Inject version into package.json
        shell: bash
        run: |
          VERSION="${{ inputs.version }}"
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '$VERSION';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify Racent signtool present
        if: inputs.is_rc == false && inputs.build_profile == 'release'
        shell: pwsh
        run: |
          $tool = "build/signing/signtool-amd64.exe"
          if (-not (Test-Path $tool)) {
            Write-Error "$tool not found in source repo. Commit Racent signtool to aoe-desktop at $tool."
            exit 1
          }
          $size = (Get-Item $tool).Length
          if ($size -lt 100000) {
            Write-Error "$tool looks too small ($size bytes). Likely a Git LFS pointer or corrupted file."
            exit 1
          }
          Write-Host "Racent signtool present: $tool ($([math]::Round($size / 1MB, 2)) MB)"

      - name: Package test launcher (Windows x64)
        run: pnpm run package:test-launcher:win
        env:
          NODE_OPTIONS: --max-old-space-size=8192
          SIGNTOOL_ACCESS_KEY: ${{ inputs.is_rc == false && inputs.build_profile == 'release' && secrets.ACCESS_KEY || '' }}
          SIGNTOOL_ACCESS_SECRET: ${{ inputs.is_rc == false && inputs.build_profile == 'release' && secrets.ACCESS_SECRET || '' }}
          SIGNTOOL_CERT_CODE: ${{ inputs.is_rc == false && inputs.build_profile == 'release' && secrets.CERT_CODE || '' }}

      - name: Collect test launcher artifact
        shell: bash
        run: |
          VERSION="${{ inputs.version }}"
          SRC="tools/floatboat-test-launcher/floatboat-test-launcher-win.zip"
          [ -f "$SRC" ] || { echo "Launcher zip not found: $SRC"; exit 1; }
          mkdir -p dist/launchers
          cp "$SRC" "dist/launchers/floatboat-test-launcher-${VERSION}-win-x64.zip"
          echo "✅ Test launcher (Windows x64): floatboat-test-launcher-${VERSION}-win-x64.zip"

      - name: Upload test launcher artifact
        uses: actions/upload-artifact@v4
        with:
          name: test-launcher-windows
          path: dist/launchers/*.zip
          retention-days: 3
          if-no-files-found: error

  # ===========================================
  # Collect & Publish Release
  # ===========================================
  upload:
    name: Upload All Artifacts
    needs: [prepare, build-macos-arm64, build-macos-x64, build-windows, build-test-launcher-macos-arm64, build-test-launcher-macos-x64, build-test-launcher-windows]
    runs-on: ubuntu-latest
    if: |
      inputs.notify_only == false &&
      always() &&
      (
        (
          needs.prepare.outputs.package_set != 'launcher' &&
          (
            needs.build-macos-arm64.result == 'success' ||
            needs.build-macos-x64.result == 'success' ||
            needs.build-windows.result == 'success'
          )
        ) ||
        (
          needs.prepare.outputs.package_set != 'app' &&
          (
            needs.build-test-launcher-macos-arm64.result == 'success' ||
            needs.build-test-launcher-macos-x64.result == 'success' ||
            needs.build-test-launcher-windows.result == 'success'
          )
        )
      )

    steps:
      - name: Checkout source repo (for scripts)
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.SOURCE_REPO }}
          ref: ${{ inputs.repo_ref }}
          token: ${{ secrets.SOURCE_REPO_PAT }}

      - name: Download changelog
        uses: actions/download-artifact@v4
        with:
          name: release-changelog
          path: /tmp/changelog/

      - name: Download macOS arm64 artifacts
        if: needs.build-macos-arm64.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: macos-arm64-build
          path: artifacts/macos-arm64/

      - name: Download macOS x64 artifacts
        if: needs.build-macos-x64.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: macos-x64-build
          path: artifacts/macos-x64/

      - name: Download Windows artifacts
        if: needs.build-windows.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: windows-x64-build
          path: artifacts/windows/

      - name: Download test launcher (macOS arm64)
        if: needs.build-test-launcher-macos-arm64.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: test-launcher-macos-arm64
          path: dist/launchers/

      - name: Download test launcher (macOS x64)
        if: needs.build-test-launcher-macos-x64.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: test-launcher-macos-x64
          path: dist/launchers/

      - name: Download test launcher (Windows x64)
        if: needs.build-test-launcher-windows.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: test-launcher-windows
          path: dist/launchers/

      - name: List test launcher artifacts
        run: |
          echo "🚀 Test launcher artifacts (kept out of out/make so update metadata ignores them):"
          ls -la dist/launchers/ 2>/dev/null || echo "  (none)"

      - name: Collect all artifacts into out/make
        run: |
          mkdir -p out/make dist

          echo "📦 Collected artifacts:"

          if [ -d "artifacts/macos-arm64" ]; then
            find artifacts/macos-arm64 -type f \( -name "*.dmg" -o -name "*.zip" \) -exec cp {} out/make/ \;
            echo "  ✅ macOS arm64:"
            find artifacts/macos-arm64 -type f | while read f; do echo "     $(basename "$f")"; done
          fi

          if [ -d "artifacts/macos-x64" ]; then
            find artifacts/macos-x64 -type f \( -name "*.dmg" -o -name "*.zip" \) -exec cp {} out/make/ \;
            echo "  ✅ macOS x64:"
            find artifacts/macos-x64 -type f | while read f; do echo "     $(basename "$f")"; done
          fi

          if [ -d "artifacts/windows" ]; then
            find artifacts/windows -type f -name "*.exe" -exec cp {} out/make/ \;
            echo "  ✅ Windows x64:"
            find artifacts/windows -type f | while read f; do echo "     $(basename "$f")"; done
          fi

          echo ""
          echo "📦 Final out/make contents:"
          ls -la out/make/

      - name: Verify required artifacts
        if: needs.prepare.outputs.package_set != 'launcher'
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${{ inputs.version }}"
          missing=0

          require_glob() {
            local pattern="$1"
            local label="$2"
            if compgen -G "$pattern" > /dev/null; then
              echo "  ✅ ${label}"
              compgen -G "$pattern" | sed 's/^/     /'
            else
              echo "::error::Missing ${label}: ${pattern}"
              missing=1
            fi
          }

          echo "🔎 Verifying artifacts produced by successful build jobs"

          if [ "${{ needs.build-macos-arm64.result }}" = "success" ]; then
            require_glob "out/make/*${VERSION}*arm64*.dmg" "macOS arm64 DMG"
            require_glob "out/make/*darwin-arm64*${VERSION}*.zip" "macOS arm64 ZIP"
          fi

          if [ "${{ needs.build-macos-x64.result }}" = "success" ]; then
            require_glob "out/make/*${VERSION}*x64*.dmg" "macOS x64 DMG"
            require_glob "out/make/*darwin-x64*${VERSION}*.zip" "macOS x64 ZIP"
          fi

          if [ "${{ needs.build-windows.result }}" = "success" ]; then
            require_glob "out/make/*Setup*${VERSION}*.exe" "Windows x64 installer"
          fi

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Generate macOS Update Metadata
        if: needs.build-macos-arm64.result == 'success' || needs.build-macos-x64.result == 'success'
        run: |
          chmod +x scripts/generate-latest-yml.sh
          rm -rf meta-work
          mkdir -p meta-work/out/make meta-work/dist
          find out/make -type f \( -name "*.dmg" -o -name "*.zip" \) -exec cp {} meta-work/out/make/ \;
          (
            cd meta-work
            ../scripts/generate-latest-yml.sh --platform mac
          )
          cp meta-work/dist/latest-mac.yml dist/latest-mac.yml

      - name: Generate Windows Update Metadata
        if: needs.build-windows.result == 'success'
        run: |
          chmod +x scripts/generate-latest-yml.sh
          EXE_FILE=$(find out/make -name "*.exe" | head -1)
          [ -n "$EXE_FILE" ] && ./scripts/generate-latest-yml.sh --platform win "$EXE_FILE"

      - name: Prepare empty public release body
        run: |
          # Release notes are internal-only and are sent to Feishu in the notify job.
          # Keep the public GitHub Release body empty to avoid publishing internal notes.
          : > /tmp/empty-release-body.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: ${{ inputs.build_profile == 'test' && format('Test v{0}', inputs.version) || inputs.is_rc == true && format('RC v{0}', inputs.version) || format('Release v{0}', inputs.version) }}
          body_path: /tmp/empty-release-body.md
          draft: false
          prerelease: ${{ inputs.is_rc || inputs.build_profile == 'test' }}
          fail_on_unmatched_files: false
          files: |
            out/make/*.dmg
            out/make/*.zip
            out/make/*.exe
            dist/launchers/*.zip
            dist/latest-mac.yml
            dist/latest.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm for bug handoff
        if: |
          inputs.promote_merged_bugs == true &&
          needs.prepare.outputs.package_set != 'launcher' &&
          (needs.build-macos-arm64.result == 'success' || needs.build-macos-x64.result == 'success' || needs.build-windows.result == 'success')
        uses: pnpm/action-setup@v4

      - name: Setup Node.js for bug handoff
        if: |
          inputs.promote_merged_bugs == true &&
          needs.prepare.outputs.package_set != 'launcher' &&
          (needs.build-macos-arm64.result == 'success' || needs.build-macos-x64.result == 'success' || needs.build-windows.result == 'success')
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install bug handoff tooling
        if: |
          inputs.promote_merged_bugs == true &&
          needs.prepare.outputs.package_set != 'launcher' &&
          (needs.build-macos-arm64.result == 'success' || needs.build-macos-x64.result == 'success' || needs.build-windows.result == 'success')
        run: |
          npm install -g @larksuite/cli@1.0.57
          pnpm install --frozen-lockfile

      - name: Configure Lark CLI for bug handoff
        if: |
          inputs.promote_merged_bugs == true &&
          needs.prepare.outputs.package_set != 'launcher' &&
          (needs.build-macos-arm64.result == 'success' || needs.build-macos-x64.result == 'success' || needs.build-windows.result == 'success')
        env:
          LARK_APP_ID: ${{ secrets.LARK_APP_ID || secrets.FEISHU_APP_ID }}
          LARK_APP_SECRET: ${{ secrets.LARK_APP_SECRET || secrets.FEISHU_APP_SECRET }}
        run: |
          set -euo pipefail
          if [ -z "${LARK_APP_ID:-}" ] || [ -z "${LARK_APP_SECRET:-}" ]; then
            echo "::error::LARK_APP_ID/LARK_APP_SECRET or FEISHU_APP_ID/FEISHU_APP_SECRET secrets are required for bug handoff"
            exit 1
          fi
          printf '%s' "$LARK_APP_SECRET" | lark-cli config init --app-id "$LARK_APP_ID" --app-secret-stdin --brand feishu
          lark-cli config default-as bot

      - name: Promote merged bug PRs to acceptance
        if: |
          inputs.promote_merged_bugs == true &&
          needs.prepare.outputs.package_set != 'launcher' &&
          (needs.build-macos-arm64.result == 'success' || needs.build-macos-x64.result == 'success' || needs.build-windows.result == 'success')
        env:
          GITHUB_TOKEN: ${{ secrets.SOURCE_REPO_PAT }}
          FLOATBOAT_BUG_BASE_TOKEN: ${{ secrets.FLOATBOAT_BUG_BASE_TOKEN || vars.FLOATBOAT_BUG_BASE_TOKEN }}
          FLOATBOAT_BUG_TABLE_ID: ${{ secrets.FLOATBOAT_BUG_TABLE_ID || vars.FLOATBOAT_BUG_TABLE_ID }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          pnpm fb promote-merged-bugs \
            --build-ref HEAD \
            --build-version "${{ inputs.version }}" \
            --build-label "floatboat-release release ${{ inputs.version }}" \
            --base-branch dev \
            --run-url "$RUN_URL" \
            --github-token "$GITHUB_TOKEN"

      # ===========================================
      # S3 Deploy (official releases only)
      # ===========================================
      - name: Configure AWS Credentials
        if: inputs.is_rc == false && inputs.build_profile != 'test' && needs.prepare.outputs.package_set != 'launcher'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Upload installers to S3
        if: inputs.is_rc == false && inputs.build_profile != 'test' && needs.prepare.outputs.package_set != 'launcher'
        run: |
          echo "📤 Uploading installers to S3..."

          # Upload all installer files
          for f in out/make/*.dmg out/make/*.zip out/make/*.exe; do
            [ -f "$f" ] || continue
            filename=$(basename "$f")
            echo "  Uploading: $filename"
            aws s3 cp "$f" "s3://aoe-desktop-releases/$filename" --no-progress
          done

          # Upload update metadata
          for f in dist/latest-mac.yml dist/latest.yml; do
            [ -f "$f" ] || continue
            filename=$(basename "$f")
            echo "  Uploading: $filename"
            aws s3 cp "$f" "s3://aoe-desktop-releases/$filename" --no-progress
          done

          echo ""
          echo "✅ S3 upload complete. Uploaded files:"
          aws s3 ls "s3://aoe-desktop-releases/" | grep "${{ inputs.version }}" || true
          aws s3 ls "s3://aoe-desktop-releases/latest" || true

      - name: Invalidate CloudFront cache
        if: inputs.is_rc == false && inputs.build_profile != 'test' && needs.prepare.outputs.package_set != 'launcher'
        run: |
          INVALIDATION=$(aws cloudfront create-invalidation \
            --distribution-id EOFLQQ0A8KCX1 \
            --paths "/*" \
            --output json)

          echo "$INVALIDATION" | jq '{Id: .Invalidation.Id, Status: .Invalidation.Status, CreateTime: .Invalidation.CreateTime}'
          echo "✅ CloudFront invalidation created"

      - name: Sync website installer URLs
        if: inputs.is_rc == false && inputs.build_profile != 'test' && needs.prepare.outputs.package_set != 'launcher'
        env:
          INSTALLER_URLS_API_TOKEN: ${{ secrets.INSTALLER_URLS_API_TOKEN }}
          INSTALLER_URLS_API_BASE_URL: ${{ vars.INSTALLER_URLS_API_BASE_URL }}
          INSTALLER_DOWNLOAD_BASE_URL: ${{ vars.INSTALLER_DOWNLOAD_BASE_URL }}
          INSTALLER_URLS_API_PATH: /api/ops/installer-urls
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail

          if [ -z "${INSTALLER_URLS_API_TOKEN:-}" ]; then
            echo "::error::INSTALLER_URLS_API_TOKEN secret is required to sync website installer URLs"
            exit 1
          fi
          if [ -z "${INSTALLER_URLS_API_BASE_URL:-}" ]; then
            echo "::error::INSTALLER_URLS_API_BASE_URL variable is required to sync website installer URLs"
            exit 1
          fi
          if [ -z "${INSTALLER_DOWNLOAD_BASE_URL:-}" ]; then
            echo "::error::INSTALLER_DOWNLOAD_BASE_URL variable is required to sync website installer URLs"
            exit 1
          fi

          INSTALLER_URLS_API_BASE_URL="${INSTALLER_URLS_API_BASE_URL%/}"
          INSTALLER_DOWNLOAD_BASE_URL="${INSTALLER_DOWNLOAD_BASE_URL%/}"
          INSTALLER_URLS_API_URL="${INSTALLER_URLS_API_BASE_URL}${INSTALLER_URLS_API_PATH}"

          require_artifact() {
            local pattern="$1"
            local label="$2"
            local artifact
            artifact=$(find out/make -type f -name "$pattern" | sort | head -1)
            if [ -z "$artifact" ]; then
              echo "::error::Missing ${label}: ${pattern}"
              exit 1
            fi
            printf '%s' "$artifact"
          }

          WINDOWS_EXE=$(require_artifact "*Setup*${VERSION}*.exe" "Windows installer")
          MAC_ARM_DMG=$(require_artifact "*${VERSION}*arm64*.dmg" "macOS arm64 DMG")
          MAC_X64_DMG=$(require_artifact "*${VERSION}*x64*.dmg" "macOS x64 DMG")

          WINDOWS_URL="${INSTALLER_DOWNLOAD_BASE_URL}/$(basename "$WINDOWS_EXE")"
          MAC_ARM_URL="${INSTALLER_DOWNLOAD_BASE_URL}/$(basename "$MAC_ARM_DMG")"
          MAC_X64_URL="${INSTALLER_DOWNLOAD_BASE_URL}/$(basename "$MAC_X64_DMG")"

          INSTALLER_URLS_JSON=$(jq -n \
            --arg windows "$WINDOWS_URL" \
            --arg mac_arm "$MAC_ARM_URL" \
            --arg mac_x64 "$MAC_X64_URL" \
            '{
              DOWNLOAD_WINDOWS_BASE_INSTALLER_URL: $windows,
              DOWNLOAD_MAC_ARM_INSTALLER_URL: $mac_arm,
              DOWNLOAD_MAC_X86_INSTALLER_URL: $mac_x64
            }')

          echo "🌐 Syncing official installer URLs for v${VERSION}"
          echo "  Windows: $(basename "$WINDOWS_EXE")"
          echo "  macOS arm64: $(basename "$MAC_ARM_DMG")"
          echo "  macOS x64: $(basename "$MAC_X64_DMG")"

          curl -sS -X PATCH "$INSTALLER_URLS_API_URL" \
            -H "Authorization: Bearer ${INSTALLER_URLS_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$INSTALLER_URLS_JSON" \
            -o /tmp/installer-urls-update.json

          jq -e '.code == 0' /tmp/installer-urls-update.json

          curl -sS "$INSTALLER_URLS_API_URL" \
            -H "Authorization: Bearer ${INSTALLER_URLS_API_TOKEN}" \
            -o /tmp/installer-urls-current.json

          jq -e \
            --arg windows "$WINDOWS_URL" \
            --arg mac_arm "$MAC_ARM_URL" \
            --arg mac_x64 "$MAC_X64_URL" \
            '.code == 0
              and .data.DOWNLOAD_WINDOWS_BASE_INSTALLER_URL == $windows
              and .data.DOWNLOAD_MAC_ARM_INSTALLER_URL == $mac_arm
              and .data.DOWNLOAD_MAC_X86_INSTALLER_URL == $mac_x64' \
            /tmp/installer-urls-current.json

          echo "✅ Website installer URLs synced and verified"

  # ===========================================
  # Release Summary & Feishu Notification
  # ===========================================
  notify:
    name: Release Summary
    needs: [prepare, build-macos-arm64, build-macos-x64, build-windows, upload]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Download changelog
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: release-changelog
          path: /tmp/changelog/

      - name: Summary
        run: |
          echo "=========================================="
          echo "       ${{ inputs.is_rc == true && 'RC' || 'Release' }} v${{ inputs.version }}"
          echo "=========================================="
          echo ""
          echo "📦 Build Results:"
          echo "   Package set:  ${{ needs.prepare.outputs.package_set }}"
          echo "   macOS arm64:  ${{ needs.build-macos-arm64.result || 'skipped' }}"
          echo "   macOS x64:    ${{ needs.build-macos-x64.result || 'skipped' }}"
          echo "   Windows x64:  ${{ needs.build-windows.result || 'skipped' }}"
          echo ""
          echo "📤 Upload:       ${{ needs.upload.result || 'skipped' }}"
          if [ "${{ inputs.is_rc }}" != "true" ] && [ "${{ inputs.build_profile }}" != "test" ] && [ "${{ needs.prepare.outputs.package_set }}" != "launcher" ]; then
          echo "☁️  S3 Deploy:    included in upload job"
          echo "🌐 CDN:          configured by INSTALLER_DOWNLOAD_BASE_URL"
          echo "🔗 Website URLs: synced via installer URL management API"
          fi
          echo ""
          echo "🔒 Release notes are sent internally to Feishu only."

      - name: Send Feishu notification
        run: |
          python3 << 'PYEOF'
          import glob
          import json
          import sys
          import textwrap
          import time
          import urllib.request

          version = "${{ inputs.version }}"
          build_profile = "${{ inputs.build_profile }}"
          package_set = "${{ needs.prepare.outputs.package_set }}"
          is_rc = "${{ inputs.is_rc }}" == "true"
          prev_tag = "${{ needs.prepare.outputs.prev_tag }}"

          macos_arm64 = "${{ needs.build-macos-arm64.result }}" or "skipped"
          macos_x64   = "${{ needs.build-macos-x64.result }}"   or "skipped"
          windows     = "${{ needs.build-windows.result }}"     or "skipped"
          upload      = "${{ needs.upload.result }}"            or "skipped"

          changelog_files = glob.glob("/tmp/changelog/changelog-*.md")
          if changelog_files:
              with open(changelog_files[0], encoding="utf-8") as f:
                  changelog = f.read().strip()
          else:
              changelog = "_Changelog not available._"

          def icon(s):
              return {"success": "✅", "failure": "❌", "cancelled": "⏹️", "skipped": "⏭️"}.get(s, "❓")

          emoji = "🧪" if build_profile == "test" else ("🚧" if is_rc else "🎉")
          release_type = "测试版本" if build_profile == "test" else ("RC 预发布" if is_rc else "正式发布")
          range_hint = f"  (since {prev_tag})" if prev_tag else ""
          release_tag = f"v{version}"
          release_base_url = f"https://github.com/floatboatai/floatboat-release/releases/download/{release_tag}"
          installer_names = [
              f"Floatboat-{version}-arm64.dmg",
              f"Floatboat-{version}-x64.dmg",
              f"Floatboat-darwin-arm64-{version}.zip",
              f"Floatboat-darwin-x64-{version}.zip",
              f"Floatboat-Setup-{version}.exe",
          ]
          launcher_names = [
              f"floatboat-test-launcher-{version}-macos-arm64.zip",
              f"floatboat-test-launcher-{version}-macos-x64.zip",
              f"floatboat-test-launcher-{version}-win-x64.zip",
          ]
          installer_links = "\n".join(f"- {name}: {release_base_url}/{name}" for name in installer_names)
          launcher_links = "\n".join(f"- {name}: {release_base_url}/{name}" for name in launcher_names)

          header = f"""{emoji} AOE Desktop {release_type} v{version}

          包类型：{package_set}

          构建结果：
            macOS arm64：{icon(macos_arm64)} {macos_arm64}
            macOS x64：  {icon(macos_x64)} {macos_x64}
            Windows x64：{icon(windows)} {windows}
            上传：       {icon(upload)} {upload}

          安装包下载：
          {installer_links}

          测试录制 launcher：
          {launcher_links}

          🔒 Release note 仅内部发送到飞书机器人，不写入公开 GitHub Release 页面。

          ────────────────────────
          Release Note{range_hint}："""

          full_text = textwrap.dedent(header).strip() + "\n\n" + changelog

          # Feishu text messages have practical payload limits. Split conservatively
          # by characters so long release notes are delivered as multiple messages.
          MAX_CHARS = 3200

          def split_text(text, max_chars):
              chunks = []
              remaining = text
              while len(remaining) > max_chars:
                  cut = remaining.rfind("\n", 0, max_chars)
                  if cut < max_chars // 2:
                      cut = max_chars
                  chunks.append(remaining[:cut].rstrip())
                  remaining = remaining[cut:].lstrip()
              if remaining:
                  chunks.append(remaining)
              return chunks or [""]

          chunks = split_text(full_text, MAX_CHARS)
          total = len(chunks)
          webhook_url = "${{ secrets.FEISHU_WEBHOOK_URL }}".strip()

          if not webhook_url or webhook_url == "***":
              print("❌ FEISHU_WEBHOOK_URL is empty or unavailable", file=sys.stderr)
              sys.exit(1)

          print(
              f"📨 Sending internal Feishu release note: version={version}, "
              f"is_rc={is_rc}, prev_tag={prev_tag or 'none'}, chunks={total}, "
              f"chars={len(full_text)}"
          )

          def parse_response(body):
              try:
                  return json.loads(body)
              except json.JSONDecodeError as exc:
                  raise RuntimeError(f"Feishu returned non-JSON response: {body!r}") from exc

          def assert_feishu_success(data):
              status_code = data.get("StatusCode")
              code = data.get("code")
              if status_code not in (None, 0) or code not in (None, 0):
                  raise RuntimeError(f"Feishu business error: {data}")

          for index, chunk in enumerate(chunks, start=1):
              text = chunk if total == 1 else f"【{index}/{total}】\n{chunk}"
              payload = json.dumps({
                  "msg_type": "text",
                  "content": {"text": text}
              }, ensure_ascii=False)

              req = urllib.request.Request(
                  webhook_url,
                  data=payload.encode("utf-8"),
                  headers={"Content-Type": "application/json; charset=utf-8"},
                  method="POST"
              )
              try:
                  with urllib.request.urlopen(req, timeout=15) as resp:
                      body = resp.read().decode()
                  data = parse_response(body)
                  assert_feishu_success(data)
                  print(
                      f"✅ Feishu delivered chunk [{index}/{total}] "
                      f"chars={len(text)} response={data}"
                  )
              except Exception as e:
                  print(f"❌ Feishu notification failed [{index}/{total}]: {e}", file=sys.stderr)
                  sys.exit(1)
              if index < total:
                  time.sleep(0.5)
          PYEOF
