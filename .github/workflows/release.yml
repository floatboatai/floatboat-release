name: Release

on:
  workflow_dispatch:
    inputs:
      repo_ref:
        description: 'Git ref to build (tag, branch, or commit SHA)'
        required: true
        type: string
      version:
        description: 'Version string (e.g., 0.2.2-rc.1)'
        required: true
        type: string
      platforms:
        description: 'Platforms to build'
        required: false
        default: 'macos,windows'
        type: choice
        options:
          - 'macos,windows'
          - 'macos'
          - 'windows'
      is_rc:
        description: 'Is this a Release Candidate?'
        required: false
        default: true
        type: boolean

permissions:
  contents: write
  actions: read

jobs:
  # ===========================================
  # Prepare
  # ===========================================
  prepare:
    name: Prepare Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ inputs.version }}
      is_rc: ${{ inputs.is_rc }}
      platforms: ${{ inputs.platforms }}

    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.SOURCE_REPO }}
          ref: ${{ inputs.repo_ref }}
          token: ${{ secrets.SOURCE_REPO_PAT }}
          fetch-depth: 0
          submodules: recursive

      - name: Inject version into package.json
        run: |
          VERSION="${{ inputs.version }}"
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '$VERSION';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          echo "✅ package.json version set to $VERSION"

      - name: Collect PR descriptions since last release
        id: prs
        run: |
          VERSION="${{ inputs.version }}"
          PREV_TAG=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | grep -v "v${VERSION}" | head -1)
          if [ -z "$PREV_TAG" ]; then
            echo "No previous tag found, using all merged PRs from last 30 days"
            PR_DATA=$(gh pr list --repo "${{ vars.SOURCE_REPO }}" --state merged --limit 50 --json number,title,body --jq '[.[] | {number, title, body: (.body // "" | .[0:500])}]')
          else
            echo "Previous tag: $PREV_TAG"
            SINCE=$(git log -1 --format=%aI "$PREV_TAG")
            PR_DATA=$(gh pr list --repo "${{ vars.SOURCE_REPO }}" --state merged --search "merged:>=$SINCE" --limit 50 --json number,title,body --jq '[.[] | {number, title, body: (.body // "" | .[0:500])}]')
          fi
          echo "$PR_DATA" > /tmp/pr_data.json
          echo "pr_count=$(echo "$PR_DATA" | jq length)" >> $GITHUB_OUTPUT
          echo "prev_tag=${PREV_TAG:-none}" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.SOURCE_REPO_PAT }}

      - name: Generate release notes with AI
        id: changelog
        continue-on-error: true
        run: |
          VERSION="${{ inputs.version }}"
          IS_RC="${{ inputs.is_rc }}"
          PREV_TAG="${{ steps.prs.outputs.prev_tag }}"
          PR_COUNT="${{ steps.prs.outputs.pr_count }}"
          PR_DATA=$(cat /tmp/pr_data.json)

          if [ "$IS_RC" == "true" ]; then
            RELEASE_TYPE="Release Candidate"
          else
            RELEASE_TYPE="Official Release"
          fi

          PROMPT="You are writing public-facing release notes for Floatboat Desktop v${VERSION} (${RELEASE_TYPE}).

          Below is internal development data (PR titles and descriptions). Your job is to transform these into user-friendly release notes. Important rules:
          - Write from the USER's perspective (what they gain), not the developer's perspective
          - Do NOT expose PR numbers, branch names, internal module names, file paths, or implementation details
          - Do NOT mention refactoring, code cleanup, or internal architecture changes unless they improve user experience
          - Skip CI/docs/test/chore changes entirely
          - If a change is purely internal with no user-visible impact, omit it
          - Use bilingual format (Chinese + English), Chinese first
          - Keep each item to one concise line describing the user benefit

          Format:
          ## 更新内容 / What's Changed
          ### ✨ 新功能 / New Features
          - 中文描述 / English description
          ### 🐛 问题修复 / Bug Fixes
          - 中文描述 / English description
          ### 💪 体验优化 / Improvements
          - 中文描述 / English description

          Internal data (${PR_COUNT} PRs since ${PREV_TAG}):
          ${PR_DATA}"

          NOTES=""
          for attempt in 1 2 3; do
            echo "AI API attempt ${attempt}/3..."
            RESPONSE=$(curl -s --max-time 600 -X POST "${{ vars.AI_API_ENDPOINT }}" \
              -H "Content-Type: application/json" \
              -H "x-api-key: $AI_API_KEY" \
              -H "anthropic-version: 2023-06-01" \
              -d "$(jq -n \
                --arg model "${{ vars.AI_MODEL }}" \
                --arg prompt "$PROMPT" \
                '{model: $model, max_tokens: 2048, messages: [{role: "user", content: $prompt}]}')")
            NOTES=$(echo "$RESPONSE" | jq -r '.content[0].text // empty')
            if [ -n "$NOTES" ]; then
              echo "✅ AI API succeeded on attempt ${attempt}"
              break
            fi
            echo "⚠️ Attempt ${attempt} failed: $(echo "$RESPONSE" | jq -r '.error.message // "unknown error"')"
            [ "$attempt" -lt 3 ] && sleep 5
          done

          if [ -z "$NOTES" ]; then
            echo "❌ AI API failed after 3 attempts, falling back to PR list"
            NOTES="## Changes in v${VERSION}\n\n"
            NOTES+=$(echo "$PR_DATA" | jq -r '.[] | "- #\(.number) \(.title)"')
          fi

          echo "$NOTES" > /tmp/release_notes.md
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}

      - name: Upload release notes artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: /tmp/release_notes.md
          retention-days: 1

  # ===========================================
  # macOS Build - arm64 (Apple Silicon)
  # ===========================================
  build-macos-arm64:
    name: Build macOS (arm64)
    needs: prepare
    runs-on: macos-latest
    if: contains(inputs.platforms, 'macos')

    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.SOURCE_REPO }}
          ref: ${{ inputs.repo_ref }}
          token: ${{ secrets.SOURCE_REPO_PAT }}
          submodules: recursive

      - name: Inject version into package.json
        run: |
          VERSION="${{ inputs.version }}"
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '$VERSION';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Gemini CLI
        run: pnpm run build:gemini

      - name: Check code signing availability
        id: signing
        run: |
          if [ -n "$APPLE_CERTIFICATE" ]; then
            echo "available=true" >> $GITHUB_OUTPUT
          else
            echo "available=false" >> $GITHUB_OUTPUT
          fi
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}

      - name: Import Code Signing Certificate
        if: steps.signing.outputs.available == 'true'
        uses: apple-actions/import-codesign-certs@v2
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Build and package (arm64)
        run: pnpm run forge:make:arm64
        env:
          NODE_OPTIONS: --max-old-space-size=8192
          BUILD_OBFUSCATE: "true"
          APPLE_IDENTITY: ${{ steps.signing.outputs.available == 'true' && secrets.APPLE_IDENTITY || '' }}
          APPLE_ID: ${{ steps.signing.outputs.available == 'true' && secrets.APPLE_ID || '' }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ steps.signing.outputs.available == 'true' && secrets.APPLE_APP_SPECIFIC_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ steps.signing.outputs.available == 'true' && secrets.APPLE_TEAM_ID || '' }}

      - name: Upload arm64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64-build
          path: |
            out/make/**/*.dmg
            out/make/**/*.zip
          retention-days: 3

  # ===========================================
  # macOS Build - x64 (Intel)
  # ===========================================
  build-macos-x64:
    name: Build macOS (x64)
    needs: prepare
    runs-on: macos-latest
    if: contains(inputs.platforms, 'macos')

    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.SOURCE_REPO }}
          ref: ${{ inputs.repo_ref }}
          token: ${{ secrets.SOURCE_REPO_PAT }}
          submodules: recursive

      - name: Inject version into package.json
        run: |
          VERSION="${{ inputs.version }}"
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '$VERSION';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Gemini CLI
        run: pnpm run build:gemini

      - name: Check code signing availability
        id: signing
        run: |
          if [ -n "$APPLE_CERTIFICATE" ]; then
            echo "available=true" >> $GITHUB_OUTPUT
          else
            echo "available=false" >> $GITHUB_OUTPUT
          fi
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}

      - name: Import Code Signing Certificate
        if: steps.signing.outputs.available == 'true'
        uses: apple-actions/import-codesign-certs@v2
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Build and package (x64)
        run: pnpm run forge:make:x64
        env:
          NODE_OPTIONS: --max-old-space-size=8192
          BUILD_OBFUSCATE: "true"
          APPLE_IDENTITY: ${{ steps.signing.outputs.available == 'true' && secrets.APPLE_IDENTITY || '' }}
          APPLE_ID: ${{ steps.signing.outputs.available == 'true' && secrets.APPLE_ID || '' }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ steps.signing.outputs.available == 'true' && secrets.APPLE_APP_SPECIFIC_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ steps.signing.outputs.available == 'true' && secrets.APPLE_TEAM_ID || '' }}

      - name: Upload x64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-x64-build
          path: |
            out/make/**/*.dmg
            out/make/**/*.zip
          retention-days: 3

  # ===========================================
  # Windows Build - x64
  # ===========================================
  build-windows:
    name: Build Windows (x64)
    needs: prepare
    runs-on: windows-latest
    if: contains(inputs.platforms, 'windows')

    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.SOURCE_REPO }}
          ref: ${{ inputs.repo_ref }}
          token: ${{ secrets.SOURCE_REPO_PAT }}
          submodules: recursive

      - name: Inject version into package.json
        shell: bash
        run: |
          VERSION="${{ inputs.version }}"
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '$VERSION';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Gemini CLI
        run: pnpm run build:gemini

      - name: Build and package
        run: pnpm run forge:make
        env:
          NODE_OPTIONS: --max-old-space-size=8192
          BUILD_OBFUSCATE: "true"

      - name: Normalize EXE filename (spaces to dashes)
        shell: bash
        run: |
          find out/make -name "*.exe" | while read f; do
            dir=$(dirname "$f")
            base=$(basename "$f")
            newname=$(echo "$base" | tr ' ' '-')
            if [ "$base" != "$newname" ]; then
              mv "$f" "$dir/$newname"
              echo "Renamed: $base -> $newname"
            fi
          done

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64-build
          path: |
            out/make/**/*.exe
          retention-days: 3
          if-no-files-found: error

  # ===========================================
  # Collect & Publish Release
  # ===========================================
  upload:
    name: Upload All Artifacts
    needs: [prepare, build-macos-arm64, build-macos-x64, build-windows]
    runs-on: ubuntu-latest
    if: |
      always() &&
      (needs.build-macos-arm64.result == 'success' || needs.build-macos-x64.result == 'success' || needs.build-windows.result == 'success')

    steps:
      - name: Checkout source repo (for scripts)
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.SOURCE_REPO }}
          ref: ${{ inputs.repo_ref }}
          token: ${{ secrets.SOURCE_REPO_PAT }}

      - name: Download release notes
        uses: actions/download-artifact@v4
        with:
          name: release-notes
          path: /tmp/

      - name: Download macOS arm64 artifacts
        if: needs.build-macos-arm64.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: macos-arm64-build
          path: artifacts/macos-arm64/

      - name: Download macOS x64 artifacts
        if: needs.build-macos-x64.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: macos-x64-build
          path: artifacts/macos-x64/

      - name: Download Windows artifacts
        if: needs.build-windows.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: windows-x64-build
          path: artifacts/windows/

      - name: Collect all artifacts into out/make
        run: |
          mkdir -p out/make dist

          echo "📦 Collected artifacts:"

          if [ -d "artifacts/macos-arm64" ]; then
            find artifacts/macos-arm64 -type f \( -name "*.dmg" -o -name "*.zip" \) -exec cp {} out/make/ \;
            echo "  ✅ macOS arm64:"
            find artifacts/macos-arm64 -type f | while read f; do echo "     $(basename "$f")"; done
          fi

          if [ -d "artifacts/macos-x64" ]; then
            find artifacts/macos-x64 -type f \( -name "*.dmg" -o -name "*.zip" \) -exec cp {} out/make/ \;
            echo "  ✅ macOS x64:"
            find artifacts/macos-x64 -type f | while read f; do echo "     $(basename "$f")"; done
          fi

          if [ -d "artifacts/windows" ]; then
            find artifacts/windows -type f -name "*.exe" -exec cp {} out/make/ \;
            echo "  ✅ Windows x64:"
            find artifacts/windows -type f | while read f; do echo "     $(basename "$f")"; done
          fi

          echo ""
          echo "📦 Final out/make contents:"
          ls -la out/make/

      - name: Generate macOS Update Metadata
        if: needs.build-macos-arm64.result == 'success' || needs.build-macos-x64.result == 'success'
        run: |
          chmod +x scripts/generate-latest-yml.sh
          ./scripts/generate-latest-yml.sh --platform mac

      - name: Generate Windows Update Metadata
        if: needs.build-windows.result == 'success'
        run: |
          chmod +x scripts/generate-latest-yml.sh
          EXE_FILE=$(find out/make -name "*.exe" | head -1)
          [ -n "$EXE_FILE" ] && ./scripts/generate-latest-yml.sh --platform win "$EXE_FILE"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: ${{ inputs.is_rc == true && format('RC v{0}', inputs.version) || format('Release v{0}', inputs.version) }}
          body_path: /tmp/release_notes.md
          draft: false
          prerelease: ${{ inputs.is_rc }}
          files: |
            out/make/*.dmg
            out/make/*.zip
            out/make/*.exe
            dist/latest-mac.yml
            dist/latest.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ===========================================
  # Release Summary
  # ===========================================
  notify:
    name: Release Summary
    needs: [prepare, build-macos-arm64, build-macos-x64, build-windows, upload]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Summary
        run: |
          echo "=========================================="
          echo "       ${{ inputs.is_rc == true && 'RC' || 'Release' }} v${{ inputs.version }}"
          echo "=========================================="
          echo ""
          echo "📦 Build Results:"
          echo "   macOS arm64:  ${{ needs.build-macos-arm64.result || 'skipped' }}"
          echo "   macOS x64:    ${{ needs.build-macos-x64.result || 'skipped' }}"
          echo "   Windows x64:  ${{ needs.build-windows.result || 'skipped' }}"
          echo ""
          echo "📤 Upload:       ${{ needs.upload.result || 'skipped' }}"
          echo ""
          echo "🔗 https://github.com/${{ github.repository }}/releases/tag/v${{ inputs.version }}"
